<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azra's Personal Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .left-corner {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
            max-width: 150px;
        }
        .content {
            margin-top: 50px; /* Adjust according to your image height */
        }
        .about-me {
            text-align: justify;
        }
        /* Vaporwave Cyberspace Aesthetics */
        .vaporwave {
            color: #ff77ff;
            text-shadow: 0 0 5px #ff77ff, 0 0 10px #ff77ff, 0 0 20px #ff77ff, 0 0 30px #ff77ff, 0 0 40px #ff77ff, 0 0 55px #ff77ff, 0 0 75px #ff77ff;
        }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/dduyg/testframe/7ebf8fd98e2af23bf91ecdbaf53d6546c29489af/left-corner.jpg" alt="Left Corner Image" class="left-corner">

    <div class="container">
        <h1 class="vaporwave">Azra</h1>
        <div class="content">
            <h2 class="vaporwave">About Me</h2>
            <p class="about-me">
                My love for thinking in systems fuels my curiosity and drives my passion for understanding complex interconnections in the world around us.
            </p>
        </div>
    </div>
</body>
</html>
