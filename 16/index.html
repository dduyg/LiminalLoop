<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Converter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Case Converter</h1>
    <textarea id="inputText" placeholder="Enter text here..."></textarea>
    <div class="options">
      <button onclick="convertToUpperCase()">UPPERCASE</button>
      <button onclick="convertToLowerCase()">lowercase</button>
      <button onclick="convertToCamelCase()">camelCase</button>
      <button onclick="convertToSnakeCase()">snake_case</button>
    </div>
    <textarea id="outputText" placeholder="Converted text will appear here..." readonly></textarea>
  </div>
  <script src="script.js"></script>
</body>
</html>
