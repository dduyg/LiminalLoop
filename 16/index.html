<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Case Converter</h1>
        <textarea id="inputText" placeholder="Enter text to convert..."></textarea>
        <div class="options">
            <button onclick="convertText('uppercase')">Upper Case</button>
            <button onclick="convertText('lowercase')">Lower Case</button>
            <button onclick="convertText('propercase')">Proper Case</button>
            <button onclick="convertText('sentencecase')">Sentence Case</button>
            <button onclick="convertText('camelcase')">Camel Case</button>
            <button onclick="convertText('snakecase')">Snake Case</button>
        </div>
        <textarea id="outputText" placeholder="Converted text will appear here..." readonly></textarea>
    </div>

    <script src="script.js"></script>
</body>
</html>
