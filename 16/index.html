<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Case Converter</h1>
        <textarea id="inputText" placeholder="Enter text..."></textarea>
        <div class="options">
            <button onclick="convertText('upper')">Upper Case</button>
            <button onclick="convertText('lower')">Lower Case</button>
            <button onclick="convertText('proper')">Proper Case</button>
            <button onclick="convertText('sentence')">Sentence Case</button>
            <button onclick="convertText('camel')">Camel Case</button>
            <button onclick="convertText('snake')">Snake Case</button>
        </div>
        <textarea id="outputText" placeholder="Converted text..."></textarea>
    </div>

    <script src="script.js"></script>
</body>
</html>
