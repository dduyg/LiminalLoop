<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            background: linear-gradient(135deg, #20002c 0%, #cbb4d4 100%);
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 10vw;
            margin: 0;
            animation: glow 1.5s infinite alternate;
        }
        h2 {
            font-size: 2vw;
            margin: 20px 0;
        }
        p {
            font-size: 1.5vw;
        }
        @keyframes glow {
            from {
                text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ff00ff, 0 0 40px #ff00ff, 0 0 50px #ff00ff, 0 0 60px #ff00ff, 0 0 70px #ff00ff;
            }
            to {
                text-shadow: 0 0 20px #ff00ff, 0 0 30px #ff00ff, 0 0 40px #ff00ff, 0 0 50px #ff00ff, 0 0 60px #ff00ff, 0 0 70px #ff00ff, 0 0 80px #ff00ff;
            }
        }
        .neon-button {
            background: none;
            border: 2px solid #ff00ff;
            color: #ff00ff;
            padding: 10px 20px;
            font-size: 1.5vw;
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.2s;
            animation: glow 1.5s infinite alternate;
        }
        .neon-button:hover {
            background: #ff00ff;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Oops! This page is like a cassette tape in a digital world.</h2>
        <p>The page you're looking for can't be found. Maybe it's stuck in the '80s.</p>
        <a href="/" class="neon-button">Back to the Future</a>
    </div>
</body>
</html>
