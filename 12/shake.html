<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1d;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 72px;
            color: #00ffcc;
            text-shadow: 2px 2px #ff00cc;
        }

        p {
            font-size: 24px;
            color: #ff00cc;
        }

        a {
            color: #00ffcc;
            text-decoration: none;
            border: 2px solid #00ffcc;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        a:hover {
            background-color: #00ffcc;
            color: #1a1a1d;
        }

        .glitch {
            font-size: 72px;
            color: #ff00cc;
            position: relative;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% {
                clip: rect(44px, 9999px, 56px, 0);
                transform: skew(0.5deg);
            }
            10% {
                clip: rect(88px, 9999px, 70px, 0);
                transform: skew(0.5deg);
            }
            20% {
                clip: rect(20px, 9999px, 99px, 0);
                transform: skew(0.5deg);
            }
            30% {
                clip: rect(42px, 9999px, 76px, 0);
                transform: skew(0.5deg);
            }
            40% {
                clip: rect(30px, 9999px, 80px, 0);
                transform: skew(0.5deg);
            }
            50% {
                clip: rect(15px, 9999px, 96px, 0);
                transform: skew(0.5deg);
            }
            60% {
                clip: rect(88px, 9999px, 65px, 0);
                transform: skew(0.5deg);
            }
            70% {
                clip: rect(54px, 9999px, 94px, 0);
                transform: skew(0.5deg);
            }
            80% {
                clip: rect(33px, 9999px, 78px, 0);
                transform: skew(0.5deg);
            }
            90% {
                clip: rect(17px, 9999px, 99px, 0);
                transform: skew(0.5deg);
            }
            100% {
                clip: rect(49px, 9999px, 66px, 0);
                transform: skew(0.5deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="glitch">404</h1>
        <p>Oops! You seem to have entered the digital void.</p>
        <a href="/">Return to Reality</a>
    </div>
</body>
</html>
