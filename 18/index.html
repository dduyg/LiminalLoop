<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #101010;
            color: #fff;
            margin: 0;
            padding: 0;
        }
        header {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ff1493;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .creation {
            width: 300px;
            margin: 20px;
            border: 2px solid #ff1493;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .creation:hover {
            transform: translateY(-5px);
        }
        .creation img {
            width: 100%;
            height: auto;
        }
        .creation .description {
            padding: 10px;
            background-color: #ff1493;
        }
        .creation .description h2 {
            font-size: 24px;
            margin: 0;
            color: #101010;
        }
        .creation .description p {
            margin: 5px 0;
            color: #101010;
        }
    </style>
</head>
<body>
    <header>
        <h1>Cyber Creations</h1>
        <p>Exploring the intersection of coding and creativity with a cyberpunk webscape theme and vaporwave aesthetics</p>
    </header>
    <div class="container">
        <div class="creation">
            <img src="your_image_1.jpg" alt="Creation 1">
            <div class="description">
                <h2>Creation Title 1</h2>
                <p>Description of your creation goes here.</p>
            </div>
        </div>
        <div class="creation">
            <img src="your_image_2.jpg" alt="Creation 2">
            <div class="description">
                <h2>Creation Title 2</h2>
                <p>Description of your creation goes here.</p>
            </div>
        </div>
        <!-- Add more creations as needed -->
    </div>
</body>
</html>
