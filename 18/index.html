<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            text-align: center;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
        .creations {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            grid-gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }
        .creation {
            background-color: #3d3d3d;
            padding: 20px;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        .creation:hover {
            transform: translateY(-5px);
        }
        .creation img {
            max-width: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Your Creations</h1>
        <p>Explore my creations where coding meets creativity in the vaporwave cyberspace.</p>
        <div class="creations">
            <div class="creation">
                <img src="your_image_1.jpg" alt="Creation 1">
                <p>Description of Creation 1</p>
            </div>
            <div class="creation">
                <img src="your_image_2.jpg" alt="Creation 2">
                <p>Description of Creation 2</p>
            </div>
            <!-- Add more creations as needed -->
        </div>
    </div>
</body>
</html>
