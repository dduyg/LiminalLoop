<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liminal⏳️Loop</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:ital@0;1&display=swap");
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      max-width: 100%;
      overflow-x: hidden;
      font-family: "Inter", sans-serif;
      background-color: rgb(255, 255, 200);
      color: rgb(10, 10, 10);
      font-size: min(1.1rem, 4vw);
    }
    body::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-image: repeating-linear-gradient(transparent, transparent 2px, #0000002d 4px);
      pointer-events: none;
      z-index: -1;
    }

    a {
      text-decoration: none;
      color: inherit;
      word-break: break-word;
    }

    .grid-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1rem;
    }

    .list__item {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      width: 100%;
      max-width: 100%;
      counter-increment: item;
      position: relative;
    }
    .list__item::before {
      content: counter(item, decimal-leading-zero);
      position: absolute;
      left: 0;
      top: 0;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8em;
    }
    .list__item-col {
      font-family: "JetBrains Mono", monospace;
      padding: 0.3rem 0.5rem;
      position: relative;
      transition: background-color 0.3s ease;
    }
    .hover-effect--bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgb(255, 223, 0);
      z-index: -1;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      mix-blend-mode: difference;
    }
    .list__item:hover .hover-effect--bg::after {
      transform: scaleX(1);
    }

    .fixed-grid {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      pointer-events: none;
      padding: 1rem;
    }
    .fixed-item {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
      padding: 0.3rem;
      pointer-events: auto;
    }
    .square {
      background-color: rgb(10, 10, 10);
      width: 8px;
      height: 8px;
    }

    .top-left { align-self: start; justify-self: start; }
    .top-right { align-self: start; justify-self: end; }
    .bottom-left { align-self: end; justify-self: start; }
    .bottom-right { align-self: end; justify-self: end; }

    .blinking { animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    @media (max-width: 600px) {
      .list__item::before {
        position: relative;
        left: auto;
        top: auto;
        display: block;
        margin-bottom: 0.3rem;
      }
      .list__item {
        flex-direction: column;
        align-items: flex-start;
      }
      .list__item-col {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <ul class="grid-container">
    <li class="list__item">
      <a href="#" class="list__item-col hover-effect hover-effect--bg">The</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Creative</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Act</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Now</a>
    </li>
    <li class="list__item">
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Be</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Open</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">to</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Possibility</a>
    </li>
    <li class="list__item">
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Everything</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">is</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">a</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Practice</a>
    </li>
    <li class="list__item">
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Pay</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Attention</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">to</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Details</a>
    </li>
    <li class="list__item">
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Trust</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">the</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Process</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Today</a>
    </li>
    <li class="list__item">
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Creativity</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">is</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">a</a>
      <a href="#" class="list__item-col hover-effect hover-effect--bg">Mindset</a>
    </li>
  </ul>

  <div class="fixed-grid">
    <div class="fixed-item top-left square"></div>
    <div class="fixed-item top-right">
      <a href="#">🎑</a> | <a href="#">(DUŶĞG)</a>
    </div>
    <div class="fixed-item bottom-left">43.9250° N, 19.5530° E</div>
    <div class="fixed-item bottom-right">
      <span id="current-time"></span>
    </div>
  </div>

  <script>
    const CONFIG = {
      timeZone: "Europe/Zagreb",
      timeUpdateInterval: 1000
    };

    class TimeDisplay {
      constructor(elementId) {
        this.element = document.getElementById(elementId);
      }

      start() {
        this.updateDisplay();
        setInterval(() => this.updateDisplay(), CONFIG.timeUpdateInterval);
      }

      updateDisplay() {
        const now = new Date();
        const formatter = new Intl.DateTimeFormat("en-US", {
          timeZone: CONFIG.timeZone,
          hour: "2-digit",
          minute: "2-digit",
          hour12: true
        });
        this.element.innerHTML = formatter.format(now).replace(":", `<span class="blinking">:</span>`);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const clock = new TimeDisplay("current-time");
      clock.start();
    });
  </script>
</body>
</html>
