<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Liminal⏳️Loop</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap");
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    :root {
      --color--foreground--100: rgb(10, 10, 10);
      --color--background--100: rgb(255, 255, 200);
      --color--accent: rgb(255, 223, 0);
      --font-primary: "Inter", sans-serif;
      --font-secondary: "JetBrains Mono", monospace;
      --blendmode-effect: difference;
      --bg-blur: 0px;
    }

    body {
      font-family: var(--font-primary);
      background-color: var(--color--background--100);
      color: var(--color--foreground--100);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      font-size: min(1.1rem, 3.5vw);
    }
    body::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-image: repeating-linear-gradient(transparent, transparent 2px, #0000002d 4px);
      pointer-events: none;
      z-index: -1;
    }

    a {
      text-decoration: none;
      color: var(--color--foreground--100);
    }

    .grid-container {
      display: flex;
      flex-direction: column;
      width: 95%;
      max-width: 1200px;
      gap: 1.5rem;
      padding: 1rem;
      counter-reset: item;
    }

    .list__item {
      counter-increment: item;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .list__item::before {
      content: counter(item, decimal-leading-zero);
      margin-right: 0.5rem;
      font-family: var(--font-secondary);
      font-weight: bold;
    }
    .hover-effect {
      position: relative;
      font-family: var(--font-secondary);
      z-index: 1;
      padding: 0.2em 0.4em;
      white-space: nowrap;
    }
    .hover-effect--bg::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--color--accent);
      mix-blend-mode: var(--blendmode-effect);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      z-index: -1;
    }
    .list__item:hover .hover-effect--bg::after {
      transform: scaleX(1);
    }

    .fixed-grid {
      position: fixed;
      top: 0;
      left: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      width: 100%;
      height: 100%;
      padding: 1rem;
      pointer-events: none;
    }
    .fixed-item {
      font-family: var(--font-secondary);
      font-size: 0.9rem;
      padding: 8px;
      pointer-events: auto;
    }
    .square {
      background-color: var(--color--foreground--100);
      width: 8px;
      height: 8px;
    }

    .top-left { grid-area: 1 / 1; justify-self: start; align-self: start; }
    .top-right { grid-area: 1 / 2; justify-self: end; align-self: start; }
    .bottom-left { grid-area: 2 / 1; justify-self: start; align-self: end; }
    .bottom-right { grid-area: 2 / 2; justify-self: end; align-self: end; }

    .blinking { animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; }}

    @media (max-width: 600px) {
      .list__item { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <ul class="grid-container">
    <li class="list__item">
      <a href="#" class="hover-effect hover-effect--bg">The</a>
      <a href="#" class="hover-effect hover-effect--bg">Creative</a>
      <a href="#" class="hover-effect hover-effect--bg">Act</a>
      <a href="#" class="hover-effect hover-effect--bg">Now</a>
    </li>
    <li class="list__item">
      <a href="#" class="hover-effect hover-effect--bg">Be</a>
      <a href="#" class="hover-effect hover-effect--bg">Open</a>
      <a href="#" class="hover-effect hover-effect--bg">to</a>
      <a href="#" class="hover-effect hover-effect--bg">Possibility</a>
    </li>
    <li class="list__item">
      <a href="#" class="hover-effect hover-effect--bg">Everything</a>
      <a href="#" class="hover-effect hover-effect--bg">is</a>
      <a href="#" class="hover-effect hover-effect--bg">a</a>
      <a href="#" class="hover-effect hover-effect--bg">Practice</a>
    </li>
    <li class="list__item">
      <a href="#" class="hover-effect hover-effect--bg">Pay</a>
      <a href="#" class="hover-effect hover-effect--bg">Attention</a>
      <a href="#" class="hover-effect hover-effect--bg">to</a>
      <a href="#" class="hover-effect hover-effect--bg">Details</a>
    </li>
    <li class="list__item">
      <a href="#" class="hover-effect hover-effect--bg">Trust</a>
      <a href="#" class="hover-effect hover-effect--bg">the</a>
      <a href="#" class="hover-effect hover-effect--bg">Process</a>
      <a href="#" class="hover-effect hover-effect--bg">Today</a>
    </li>
    <li class="list__item">
      <a href="#" class="hover-effect hover-effect--bg">Creativity</a>
      <a href="#" class="hover-effect hover-effect--bg">is</a>
      <a href="#" class="hover-effect hover-effect--bg">a</a>
      <a href="#" class="hover-effect hover-effect--bg">Mindset</a>
    </li>
  </ul>

  <div class="fixed-grid">
    <div class="fixed-item top-left square"></div>
    <div class="fixed-item top-right">
      <a href="#">🎑</a> |
      <a href="#">(DUŶĞG)</a>
    </div>
    <div class="fixed-item bottom-left">43.9250° N, 19.5530° E</div>
    <div class="fixed-item bottom-right">
      <span id="current-time"></span>
    </div>
  </div>

  <script>
    const CONFIG = {
      timeZone: "Europe/Zagreb",
      timeUpdateInterval: 1000
    };

    class TimeDisplay {
      constructor(elementId) {
        this.element = document.getElementById(elementId);
        if (!this.element) throw new Error("Element not found");
      }

      start() {
        this.updateDisplay();
        setInterval(() => this.updateDisplay(), CONFIG.timeUpdateInterval);
      }

      updateDisplay() {
        const now = new Date();
        const options = {
          timeZone: CONFIG.timeZone,
          hour: '2-digit',
          minute: '2-digit',
          hour12: true
        };
        const formatter = new Intl.DateTimeFormat("en-US", options);
        const parts = formatter.formatToParts(now);
        const hours = parts.find(p => p.type === "hour").value;
        const minutes = parts.find(p => p.type === "minute").value;
        const dayPeriod = parts.find(p => p.type === "dayPeriod").value;
        this.element.innerHTML = `${hours}<span class="blinking">:</span>${minutes} ${dayPeriod}`;
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      new TimeDisplay("current-time").start();
    });
  </script>
</body>
</html>
