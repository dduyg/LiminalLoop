<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Liminal⏳️Loop</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=JetBrains+Mono:ital@0;1&display=swap");
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
    }
    :root {
      --color--foreground--100: rgb(10, 10, 10);
      --color--background--100: rgb(255, 255, 200);
      --color--accent: rgb(255, 223, 0);
      --font-primary: "Inter", sans-serif;
      --font-secondary: "JetBrains Mono", monospace;
      --blendmode-effect: difference;
      --bg-blur: 0px;
    }    
    body {
      font-family: var(--font-primary);
      background-color: var(--color--background--100);
      color: var(--color--foreground--100);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-weight: 400;
      font-size: clamp(0.9rem, 1.5vw, 1.1rem);
      position: relative;
      overflow-x: hidden;
      z-index: 10;
    }
    body::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-image: repeating-linear-gradient(transparent, transparent 2px, #0000002d 4px);
      pointer-events: none;
      z-index: -1;
    }

    a {
      text-decoration: none;
      color: var(--color--foreground--100);
    }

    .grid-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 100%;
      padding: 1rem;
    }

    .list__item {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      padding: 0.25rem 0;
      counter-increment: item;
    }
    .list__item::before {
      content: counter(item, decimal-leading-zero);
      margin-right: 0.75rem;
      font-weight: bold;
    }
    .hover-effect {
      font-family: var(--font-secondary);
      position: relative;
      color: var(--color--foreground--100);
      white-space: nowrap;
      word-break: break-word;
      overflow-wrap: break-word;
      min-width: 0;
      max-width: 100%;
    }
    .hover-effect--bg::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--color--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      mix-blend-mode: var(--blendmode-effect);
      z-index: -1;
    }
    .list__item:hover .hover-effect--bg::after {
      transform: scaleX(1);
    }

    .fixed-grid {
      position: fixed;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      width: 100%;
      height: 100%;
      padding: 1rem;
      pointer-events: none;
    }
    .fixed-item {
      font-family: var(--font-secondary);
      font-size: 0.85rem;
      color: var(--color--foreground--100);
      pointer-events: auto;
    }
    .square {
      width: 8px;
      height: 8px;
      background-color: var(--color--foreground--100);
    }

    .top-left { align-self: start; justify-self: start; }
    .top-right { align-self: start; justify-self: end; }
    .bottom-left { align-self: end; justify-self: start; }
    .bottom-right { align-self: end; justify-self: end; }

    .blinking {  animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <ul class="grid-container">
    <li class="list__item">
      <a href="#" class="hover-effect hover-effect--bg">The</a>
      <a href="#" class="hover-effect hover-effect--bg">Creative</a>
      <a href="#" class="hover-effect hover-effect--bg">Act</a>
      <a href="#" class="hover-effect hover-effect--bg">Now</a>
    </li>
    <li class="list__item">
      <a href="#" class="hover-effect hover-effect--bg">Be</a>
      <a href="#" class="hover-effect hover-effect--bg">Open</a>
      <a href="#" class="hover-effect hover-effect--bg">to</a>
      <a href="#" class="hover-effect hover-effect--bg">Possibility</a>
    </li>
    <li class="list__item">
      <a href="#" class="hover-effect hover-effect--bg">Everything</a>
      <a href="#" class="hover-effect hover-effect--bg">is</a>
      <a href="#" class="hover-effect hover-effect--bg">a</a>
      <a href="#" class="hover-effect hover-effect--bg">Practice</a>
    </li>
    <li class="list__item">
      <a href="#" class="hover-effect hover-effect--bg">Pay</a>
      <a href="#" class="hover-effect hover-effect--bg">Attention</a>
      <a href="#" class="hover-effect hover-effect--bg">to</a>
      <a href="#" class="hover-effect hover-effect--bg">Details</a>
    </li>
    <li class="list__item">
      <a href="#" class="hover-effect hover-effect--bg">Trust</a>
      <a href="#" class="hover-effect hover-effect--bg">the</a>
      <a href="#" class="hover-effect hover-effect--bg">Process</a>
      <a href="#" class="hover-effect hover-effect--bg">Today</a>
    </li>
    <li class="list__item">
      <a href="#" class="hover-effect hover-effect--bg">Creativity</a>
      <a href="#" class="hover-effect hover-effect--bg">is</a>
      <a href="#" class="hover-effect hover-effect--bg">a</a>
      <a href="#" class="hover-effect hover-effect--bg">Mindset</a>
    </li>
  </ul>

  <div class="fixed-grid">
    <div class="fixed-item top-left square"></div>
    <div class="fixed-item top-right">
      <a href="#">🎑</a> | <a href="#">(DUŶĞG)</a>
    </div>
    <div class="fixed-item bottom-left">43.9250° N, 19.5530° E</div>
    <div class="fixed-item bottom-right">
      <span id="current-time"></span>
    </div>
  </div>

  <script>
    const CONFIG = {
      timeZone: "Europe/Zagreb",
      timeUpdateInterval: 1000,
    };

    class TimeDisplay {
      constructor(elementId) {
        this.element = document.getElementById(elementId);
      }

      start() {
        this.updateDisplay();
        setInterval(() => this.updateDisplay(), CONFIG.timeUpdateInterval);
      }

      updateDisplay() {
        const now = new Date();
        const options = {
          timeZone: CONFIG.timeZone,
          hour12: true,
          hour: "2-digit",
          minute: "2-digit",
        };
        const timeStr = new Intl.DateTimeFormat("en-US", options).format(now);
        this.element.innerHTML = timeStr.replace(":", '<span class="blinking">:</span>');
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const timeDisplay = new TimeDisplay("current-time");
      timeDisplay.start();
    });
  </script>
</body>
</html>
