<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Liminal🦑Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Notable&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --color-background: rgb(85, 85, 85);
      --color-foreground: rgb(230, 225, 215);
      --color-accent: rgb(200, 180, 160);
      --font-primary: "Notable", sans-serif;
      --font-secondary: "IBM Plex Mono", monospace;
      --margin: 32px;
      --gutter: 16px;
    }
    body {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      min-height: 400vh;
      margin: 0; padding: 0;
      font-family: var(--font-primary);
      background: radial-gradient(circle at 10% 20%, rgb(45, 45, 45) 0%, rgb(5, 5, 5) 90%);
      color: var(--color-foreground);
      letter-spacing: -0.03em;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: transparent url("noise-transparent.png") repeat 0 0;
      background-size: 300px 300px;
      animation: noise-animation 0.3s steps(5) infinite;
      opacity: 0.9;
      will-change: transform;
      z-index: 100;
      pointer-events: none;
    }
    @keyframes noise-animation {
      0% { transform: translate(0, 0); }
      10% { transform: translate(-2%, -3%); }
      20% { transform: translate(-4%, 2%); }
      30% { transform: translate(2%, -4%); }
      40% { transform: translate(-2%, 5%); }
      50% { transform: translate(-4%, 2%); }
      60% { transform: translate(3%, 0); }
      70% { transform: translate(0, 3%); }
      80% { transform: translate(-3%, 0); }
      90% { transform: translate(2%, 2%); }
      100% { transform: translate(1%, 0); }
    }

    canvas {
      width: 100%; height: 100%;
      display: block;
      position: fixed;
      top: 0; left: 0;
      background: transparent;
      z-index: -1;
    }

    /* --- Custom Controls Overlay --- */
    .controls-wrapper {
      position: fixed;
      top: var(--margin);
      right: var(--margin);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .menu-btn {
      width: 44px; height: 44px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, transform 0.2s;
      padding: 10px;
      backdrop-filter: blur(8px);
    }
    .menu-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .menu-btn svg {
      width: 100%; height: 100%;
      fill: var(--color-foreground);
    }
    .controls-dropdown.open .menu-btn svg {
      transform: rotate(45deg);
    }

    .controls-dropdown {
      margin-top: 12px;
      background: rgba(15, 15, 15, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-family: var(--font-secondary);
      padding: 20px;
      width: 280px;
      max-h: 75vh;
      overflow-y: auto;
      display: none;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .controls-dropdown.open {
      display: flex;
    }

    .control-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .control-section h4 {
      margin: 0 0 4px 0;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-accent);
      opacity: 0.8;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .control-group label {
      font-size: 0.75rem;
      opacity: 0.7;
    }

    /* Custom Slider */
    .control-group input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%; height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
    }
    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--color-foreground);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    .control-group input[type="color"] {
      -webkit-appearance: none;
      border: none;
      width: 100%; height: 24px;
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
    } 
    .control-group input[type="color"]::-webkit-color-swatch {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    /* Scroll container to handle ScrollTrigger bounds */
    #scroll-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .content {
      position: absolute;
      top: 45px; left: 0;
      z-index: 1000;
      padding: 2rem;
      font-size: 3rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      max-width: 20ch;
      line-height: 0.85;
    }
  </style>
</head>
<body>
  <div id="scroll-container"></div>
  <div class="content">Echoes in the void.</div>

  <div class="controls-wrapper">
    <button class="menu-btn" id="menuToggle" aria-label="Toggle Controls">
      <svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">

      </svg>
    </button>
    <div class="controls-dropdown" id="controlsDropdown">
      <div class="control-section">
        <h4>Material</h4>
        <div class="control-group"><label>Color</label><input type="color" id="mat-color" value="#ffffff"></div>
        <div class="control-group"><label>Metalness</label><input type="range" id="mat-metalness" min="0" max="1" step="0.01" value="0.2"></div>
        <div class="control-group"><label>Roughness</label><input type="range" id="mat-roughness" min="0" max="1" step="0.01" value="0.1"></div>
        <div class="control-group"><label>Transmission</label><input type="range" id="mat-transmission" min="0" max="1" step="0.01" value="0.9"></div>
        <div class="control-group"><label>Thickness</label><input type="range" id="mat-thickness" min="0" max="5" step="0.1" value="0.5"></div>
        <div class="control-group"><label>IOR</label><input type="range" id="mat-ior" min="1" max="2.333" step="0.01" value="1.5"></div>
      </div>
      <div class="control-section">
        <h4>Motion</h4>
        <div class="control-group"><label>Rotation Speed</label><input type="range" id="motion-speed" min="0" max="2" step="0.05" value="0.5"></div>
      </div>
      <div class="control-section">
        <h4>Distortion</h4>
        <div class="control-group"><label>Strength</label><input type="range" id="dist-strength" min="0" max="1" step="0.01" value="0.1"></div>
        <div class="control-group"><label>Radius</label><input type="range" id="dist-radius" min="0.1" max="0.5" step="0.01" value="0.2"></div>
        <div class="control-group"><label>Chromatic Aberration</label><input type="range" id="dist-chromatic" min="0" max="0.1" step="0.005" value="0.02"></div>
        <div class="control-group"><label>Wave Distortion</label><input type="range" id="dist-wave" min="0" max="0.1" step="0.005" value="0.05"></div>
        <div class="control-group"><label>Lens Blur</label><input type="range" id="dist-blur" min="0" max="0.1" step="0.005" value="0.1"></div>
      </div>
    </div>
  </div>

  <script src='https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js'></script>
  <script src='https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js'></script>
  <script type="module">
    import * as THREE from "https://esm.sh/three@0.136.0";
    import { OrbitControls } from "https://esm.sh/three@0.136.0/examples/jsm/controls/OrbitControls.js";
    import { EffectComposer } from "https://esm.sh/three@0.136.0/examples/jsm/postprocessing/EffectComposer.js";
    import { RenderPass } from "https://esm.sh/three@0.136.0/examples/jsm/postprocessing/RenderPass.js";
    import { ShaderPass } from "https://esm.sh/three@0.136.0/examples/jsm/postprocessing/ShaderPass.js";

    gsap.registerPlugin(ScrollTrigger);

    let scene, camera, renderer, controls;
    let composer, customPass;
    let outerTorus, middleTorus, innerTorus, mouseSphere;
    let cubeRenderTarget, cubeCamera;
    let backgroundTexture;
    let mouse = new THREE.Vector2();
    let raycaster = new THREE.Raycaster();
    let shards = [];

    const PARAMS = {
      material: {
        color: "#FFFFFF",
        metalness: 0.2,
        roughness: 0.1,
        transmission: 0.9,
        thickness: 0.5,
        ior: 1.5,
        clearcoat: 1,
        clearcoatRoughness: 0.1
      },
      rotationSpeed: 0.5,
      distortion: {
        strength: 0.1,
        radius: 0.2,
        edgeWidth: 0.03,
        edgeOpacity: 0.1,
        chromaticAberration: 0.02,
        reflectionIntensity: 0.2,
        waveDistortion: 0.05,
        waveSpeed: 0.8,
        lensBlur: 0.1,
        clearCenterSize: 0.5,
        magnification: 1.5
      },
      shatter: {
        pieces: 50,
        force: 5,
        duration: 2
      }
    };

    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 5);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;

      setupLights();
      createBackground();
      createShapes();
      setupPostProcessing();
      setupCustomUIHooks();
      setupScrollTrigger();

      window.addEventListener("resize", onWindowResize, false);
      document.addEventListener("mousemove", onMouseMove, false);

      animate(0);
    }

    function setupLights() {
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(5, 5, 5);
      scene.add(directionalLight);

      const pointLight = new THREE.PointLight(0xffffff, 1, 100);
      pointLight.position.set(0, 0, 10);
      scene.add(pointLight);
    }

    function createBackground() {
      const loader = new THREE.TextureLoader();
      loader.load(
        "https://cdn.jsdelivr.net/gh/dduyg/LiminalLoop@shelf/0-6/pixels/echoes-in-the-void.jpg",
        (texture) => {
          backgroundTexture = texture;
          updateBackgroundSize();
        }
      );
    }

    function updateBackgroundSize() {
      if (backgroundTexture) {
        const aspect = window.innerWidth / window.innerHeight;
        const imageAspect = backgroundTexture.image.width / backgroundTexture.image.height;

        let scale;
        if (aspect > imageAspect) {
          scale = new THREE.Vector2(1, imageAspect / aspect);
        } else {
          scale = new THREE.Vector2(aspect / imageAspect, 1);
        }

        backgroundTexture.offset.set((1 - scale.x) / 2, (1 - scale.y) / 2);
        backgroundTexture.repeat.set(scale.x, scale.y);
        scene.background = backgroundTexture;
      }
    }

    function createGlassMaterial() {
      return new THREE.MeshPhysicalMaterial({
        color: new THREE.Color(PARAMS.material.color),
        metalness: PARAMS.material.metalness,
        roughness: PARAMS.material.roughness,
        transmission: PARAMS.material.transmission,
        thickness: PARAMS.material.thickness,
        ior: PARAMS.material.ior,
        clearcoat: PARAMS.material.clearcoat,
        clearcoatRoughness: PARAMS.material.clearcoatRoughness,
        side: THREE.DoubleSide,
        transparent: true,
        envMapIntensity: 1,
        refractionRatio: 0.98
      });
    }

    function createShapes() {
      cubeRenderTarget = new THREE.WebGLCubeRenderTarget(256, {
        format: THREE.RGBAFormat,
        generateMipmaps: true,
        minFilter: THREE.LinearMipmapLinearFilter
      });
      cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);

      const glassMaterial = createGlassMaterial();
      glassMaterial.envMap = cubeRenderTarget.texture;
      glassMaterial.envMap.mapping = THREE.CubeRefractionMapping;

      const outerTorusGeometry = new THREE.TorusGeometry(1.2, 0.3, 64, 64);
      const middleTorusGeometry = new THREE.TorusGeometry(0.9, 0.25, 64, 64);
      const innerTorusGeometry = new THREE.TorusGeometry(0.6, 0.2, 64, 64);
      const sphereGeometry = new THREE.SphereGeometry(0.3, 32, 32);

      outerTorus = new THREE.Mesh(outerTorusGeometry, glassMaterial.clone());
      middleTorus = new THREE.Mesh(middleTorusGeometry, glassMaterial.clone());
      innerTorus = new THREE.Mesh(innerTorusGeometry, glassMaterial.clone());
      mouseSphere = new THREE.Mesh(sphereGeometry, glassMaterial.clone());

      outerTorus.position.set(-1.5, 0, 0);
      middleTorus.position.set(0, 0, 0);
      innerTorus.position.set(1.5, 0, 0);

      scene.add(outerTorus);
      scene.add(middleTorus);
      scene.add(innerTorus);
      scene.add(mouseSphere);
    }

    function setupPostProcessing() {
      composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));

      const vertexShader = `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;

      const fragmentShader = `
        uniform sampler2D tDiffuse;
        uniform vec2 uMouse;
        uniform float uRadius;
        uniform float uStrength;
        uniform float uEdgeWidth;
        uniform float uEdgeOpacity;
        uniform float uChromaticAberration;
        uniform float uReflectionIntensity;
        uniform float uWaveDistortion;
        uniform float uWaveSpeed;
        uniform float uLensBlur;
        uniform float uClearCenterSize;
        uniform float uAspect;
        uniform float uTime;
        varying vec2 vUv;

        vec4 blur(sampler2D image, vec2 uv, vec2 resolution, vec2 direction) {
            vec4 color = vec4(0.0);
            vec2 off1 = vec2(1.3333333333333333) * direction;
            color += texture2D(image, uv) * 0.29411764705882354;
            color += texture2D(image, uv + (off1 / resolution)) * 0.35294117647058826;
            color += texture2D(image, uv - (off1 / resolution)) * 0.35294117647058826;
            return color;
        }

        void main() {
            vec2 center = uMouse;
            vec2 adjustedUv = vUv;
            adjustedUv.x *= uAspect;
            center.x *= uAspect;
            float dist = distance(adjustedUv, center);
            
            if (dist < uRadius) {
                float normalizedDist = dist / uRadius;
                vec2 direction = normalize(adjustedUv - center);
                
                float clearArea = uClearCenterSize * uRadius;
                float distortionFactor = smoothstep(clearArea, uRadius, dist);
                
                vec2 distortedUv = adjustedUv - direction * uStrength * distortionFactor * distortionFactor;
                
                float wave = sin(normalizedDist * 10.0 - uTime * uWaveSpeed) * uWaveDistortion * distortionFactor;
                distortedUv += direction * wave;
                
                distortedUv.x /= uAspect;

                float aberrationStrength = uChromaticAberration * distortionFactor;
                vec2 redUv = distortedUv + direction * aberrationStrength / vec2(uAspect, 1.0);
                vec2 blueUv = distortedUv - direction * aberrationStrength / vec2(uAspect, 1.0);

                vec4 colorR = texture2D(tDiffuse, redUv);
                vec4 colorG = texture2D(tDiffuse, distortedUv);
                vec4 colorB = texture2D(tDiffuse, blueUv);

                vec4 reflection = texture2D(tDiffuse, vUv + direction * 0.1 * distortionFactor);
                
                gl_FragColor = vec4(colorR.r, colorG.g, colorB.b, 1.0);
                gl_FragColor = mix(gl_FragColor, reflection, uReflectionIntensity * distortionFactor);

                float blurAmount = uLensBlur * distortionFactor;
                gl_FragColor = mix(gl_FragColor, blur(tDiffuse, distortedUv, vec2(1.0 / uAspect, 1.0), vec2(blurAmount)), distortionFactor);

                float edgeHighlight = smoothstep(uRadius - uEdgeWidth, uRadius, dist);
                gl_FragColor = mix(gl_FragColor, vec4(1.0, 1.0, 1.0, 1.0), edgeHighlight * uEdgeOpacity);
            } else {
                gl_FragColor = texture2D(tDiffuse, vUv);
            }
        }
      `;

      customPass = new ShaderPass({
        uniforms: {
          tDiffuse: { value: null },
          uMouse: { value: new THREE.Vector2(0.5, 0.5) },
          uRadius: { value: PARAMS.distortion.radius },
          uStrength: { value: PARAMS.distortion.strength },
          uEdgeWidth: { value: PARAMS.distortion.edgeWidth },
          uEdgeOpacity: { value: PARAMS.distortion.edgeOpacity },
          uChromaticAberration: { value: PARAMS.distortion.chromaticAberration },
          uReflectionIntensity: { value: PARAMS.distortion.reflectionIntensity },
          uWaveDistortion: { value: PARAMS.distortion.waveDistortion },
          uWaveSpeed: { value: PARAMS.distortion.waveSpeed },
          uLensBlur: { value: PARAMS.distortion.lensBlur },
          uClearCenterSize: { value: PARAMS.distortion.clearCenterSize },
          uAspect: { value: window.innerWidth / window.innerHeight },
          uTime: { value: 0 }
        },
        vertexShader: vertexShader,
        fragmentShader: fragmentShader
      });
      composer.addPass(customPass);
    }

    function updateMaterials() {
      const newMaterial = createGlassMaterial();
      newMaterial.envMap = cubeRenderTarget.texture;
      newMaterial.envMap.mapping = THREE.CubeRefractionMapping;

      [outerTorus, middleTorus, innerTorus, mouseSphere].forEach((obj) => {
        if (obj) {
          obj.material.dispose();
          obj.material = newMaterial.clone();
        }
      });
    }

    // --- Wire custom native DOM controls ---
    function setupCustomUIHooks() {
      const menuToggle = document.getElementById('menuToggle');
      const controlsDropdown = document.getElementById('controlsDropdown');

      menuToggle.addEventListener('click', () => {
        controlsDropdown.classList.toggle('open');
      });

      // Material listeners
      document.getElementById('mat-color').addEventListener('input', (e) => {
        PARAMS.material.color = e.target.value;
        updateMaterials();
      });
      document.getElementById('mat-metalness').addEventListener('input', (e) => {
        PARAMS.material.metalness = parseFloat(e.target.value);
        updateMaterials();
      });
      document.getElementById('mat-roughness').addEventListener('input', (e) => {
        PARAMS.material.roughness = parseFloat(e.target.value);
        updateMaterials();
      });
      document.getElementById('mat-transmission').addEventListener('input', (e) => {
        PARAMS.material.transmission = parseFloat(e.target.value);
        updateMaterials();
      });
      document.getElementById('mat-thickness').addEventListener('input', (e) => {
        PARAMS.material.thickness = parseFloat(e.target.value);
        updateMaterials();
      });
      document.getElementById('mat-ior').addEventListener('input', (e) => {
        PARAMS.material.ior = parseFloat(e.target.value);
        updateMaterials();
      });

      // Motion listeners
      document.getElementById('motion-speed').addEventListener('input', (e) => {
        PARAMS.rotationSpeed = parseFloat(e.target.value);
      });

      // Distortion Uniform listeners
      document.getElementById('dist-strength').addEventListener('input', (e) => {
        customPass.uniforms.uStrength.value = parseFloat(e.target.value);
      });
      document.getElementById('dist-radius').addEventListener('input', (e) => {
        customPass.uniforms.uRadius.value = parseFloat(e.target.value);
      });
      document.getElementById('dist-chromatic').addEventListener('input', (e) => {
        customPass.uniforms.uChromaticAberration.value = parseFloat(e.target.value);
      });
      document.getElementById('dist-wave').addEventListener('input', (e) => {
        customPass.uniforms.uWaveDistortion.value = parseFloat(e.target.value);
      });
      document.getElementById('dist-blur').addEventListener('input', (e) => {
        customPass.uniforms.uLensBlur.value = parseFloat(e.target.value);
      });
    }

    function setupScrollTrigger() {
      ScrollTrigger.create({
        trigger: "#scroll-container",
        start: "top top",
        end: "bottom bottom",
        scrub: true,
        onUpdate: (self) => {
          const progress = self.progress;
          if (progress > 0 && !shards.length) {
            shatterObjects();
          } else if (progress === 0 && shards.length) {
            restoreObjects();
          }
          updateShardPositions(progress);
        }
      });
    }

    function shatterObjects() {
      [outerTorus, middleTorus, innerTorus, mouseSphere].forEach((object) => {
        if (object && object.parent) {
          const newShards = createShards(object);
          shards.push(...newShards);
          scene.remove(object);
        }
      });
    }

    function createShards(object) {
      const { pieces } = PARAMS.shatter;
      const geometry = object.geometry;
      const positions = geometry.attributes.position.array;
      const newShards = [];

      for (let i = 0; i < pieces; i++) {
        const shardGeometry = new THREE.BufferGeometry();
        const shardPositions = [];
        const shardNormals = [];
        const shardUvs = [];

        for (let j = 0; j < positions.length; j += 9) {
          if (Math.random() < 0.1) {
            for (let k = 0; k < 9; k++) {
              shardPositions.push(positions[j + k]);
            }
            for (let k = 0; k < 3; k++) {
              shardNormals.push(0, 1, 0);
              shardUvs.push(0, 0);
            }
          }
        }

        shardGeometry.setAttribute("position", new THREE.Float32BufferAttribute(shardPositions, 3));
        shardGeometry.setAttribute("normal", new THREE.Float32BufferAttribute(shardNormals, 3));
        shardGeometry.setAttribute("uv", new THREE.Float32BufferAttribute(shardUvs, 2));

        const shard = new THREE.Mesh(shardGeometry, object.material.clone());
        shard.position.copy(object.position);
        shard.originalPosition = object.position.clone();
        shard.targetPosition = object.position
          .clone()
          .add(
            new THREE.Vector3(
              (Math.random() - 0.5) * PARAMS.shatter.force,
              (Math.random() - 0.5) * PARAMS.shatter.force,
              (Math.random() - 0.5) * PARAMS.shatter.force
            )
          );
        scene.add(shard);
        newShards.push(shard);
      }
      return newShards;
    }

    function updateShardPositions(progress) {
      shards.forEach((shard) => {
        shard.position.lerpVectors(shard.originalPosition, shard.targetPosition, progress);
        shard.rotation.x = progress * Math.PI * 2 * Math.random();
        shard.rotation.y = progress * Math.PI * 2 * Math.random();
        shard.rotation.z = progress * Math.PI * 2 * Math.random();
        shard.scale.setScalar(1 - progress * 0.5);
      });
    }

    function restoreObjects() {
      shards.forEach((shard) => {
        scene.remove(shard);
        shard.geometry.dispose();
        shard.material.dispose();
      });
      shards = [];

      [outerTorus, middleTorus, innerTorus, mouseSphere].forEach((object) => {
        if (object && !object.parent) {
          scene.add(object);
        }
      });
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      customPass.uniforms.uAspect.value = window.innerWidth / window.innerHeight;
      updateBackgroundSize();
    }

    function onMouseMove(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      customPass.uniforms.uMouse.value.set(
        event.clientX / window.innerWidth,
        1 - event.clientY / window.innerHeight
      );
    }

    function animate(time) {
      requestAnimationFrame(animate);

      if (outerTorus && outerTorus.parent) {
        outerTorus.rotation.x += PARAMS.rotationSpeed * 0.01;
        outerTorus.rotation.y += PARAMS.rotationSpeed * 0.01;
        middleTorus.rotation.y -= PARAMS.rotationSpeed * 0.015;
        middleTorus.rotation.z += PARAMS.rotationSpeed * 0.015;
        innerTorus.rotation.x -= PARAMS.rotationSpeed * 0.02;
        innerTorus.rotation.z -= PARAMS.rotationSpeed * 0.02;
      }

      if (mouseSphere && mouseSphere.parent) {
        const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5);
        vector.unproject(camera);
        const dir = vector.sub(camera.position).normalize();
        const distance = -camera.position.z / dir.z;
        const pos = camera.position.clone().add(dir.multiplyScalar(distance));
        mouseSphere.position.copy(pos);
      }

      if(renderer && scene && cubeCamera) {
        cubeCamera.update(renderer, scene);
      }

      if(customPass) {
        customPass.uniforms.uTime.value = time * 0.001;
      }
      
      controls.update();
      composer.render();
    }

    init();
  </script>
</body>
</html>
