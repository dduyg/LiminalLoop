<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Liminal🔬Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent;}
    @font-face { 
      font-family: 'Kalamayka'; 
      src: url('https://cdn.jsdelivr.net/gh/dduyg/LiminalLoop@main/fonts/KalamaykaVF.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/gh/dduyg/LiminalLoop@main/fonts/KalamaykaVF.woff') format('woff');
      font-weight: 100 700; /* for variable fonts */ 
      font-style: normal;
    }
    :root {
      --color-background: rgb(10, 10, 10);
      --color-foreground: rgb(240, 240, 240);
      --color-accent: rgb(255, 211, 182);
      --margin: 32px;
      --gutter: 16px;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      font-family: 'Kalamayka', monospace;
      font-variation-settings: 'wght' 400;
      background-color: var(--color-background);
      color: var(--color-foreground);
      text-align: center;
    }
    .container {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100vh;
      padding: var(--gutter);
    }
    .sidebar {
      width: 40%;
      padding: var(--margin);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: left;
    }
    .logo {
      font-size: 20rem;
      line-height: 0.9;
      color: var(--color-accent);
      margin-bottom: 1rem;
      margin-left: -22px;
    }
    .logo sup { font-size: 6rem; }
    @media (max-width: 768px) { 
      .logo {font-size: 10rem;}
      .logo sup {font-size: 3rem;}
    }
    .description {
      font-size: 0.75rem;
      line-height: 1.2;
      margin-bottom: 40px;
      max-width: 360px;
    }
    .nav-links {
      display: flex;
      flex-direction: column;
    }
    .nav-links a {
      color: var(--color-foreground);
      text-decoration: none;
      transition: color 0.3s;
      margin: 4px 0;
    }
    .nav-links a:hover { color: var(--color-accent); }
    .footer {
      margin-top: 1rem;
      font-size: 0.65rem;
    }
    .footer p { opacity: 0.5; }
    .division { 
      margin-top: auto;
      font-family: "Cormorant", serif;
    }
    .main-content {
      width: 65%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--margin);
      text-transform: uppercase;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="logo">DX<sup>°</sup></div>
      <p class="description">THE ARCHIVE COLLECTS RECORDS OF ABANDONED WORLDS AND LOST TECHNOLOGIES, WAITING TO BE DISCOVERED.</p>
      <nav class="nav-links">
        <a href="#">_DATA VAULTS</a>
        <a href="#">_DEEP SPACE</a>
        <a href="#">_FORBIDDEN ZONES</a>
        <a href="#">_EXODUS LOGS</a>
      </nav>
      <div class="footer">
        <p>Err: [404 - SIGNAL LOST]<br />SYSTEM TIME: CYCLE 2187.42</p>
      </div>
      <p class="division">ACCESS LEVEL: RESTRICTED.<br>TRACE INITIATED: SOURCE UNKNOWN.</p>
    </div>
    <div class="main-content">
      <p class="signal">_Uplink Pending...</p>
    </div>
  </div>

  <script src='https://d3js.org/d3-delaunay.v6.min.js'></script>
  <script src='https://unpkg.com/three@0.126.0/examples/js/loaders/OBJLoader.js'></script>
  <script type="module">
    import * as THREE from "https://esm.sh/three@0.136.0";
    import { OrbitControls } from "https://esm.sh/three@0.136.0/examples/jsm/controls/OrbitControls.js";
    import RAPIER from "https://esm.sh/@dimforge/rapier3d-compat@0.11.2";
    import { EffectComposer } from "https://esm.sh/three@0.136.0/examples/jsm/postprocessing/EffectComposer.js";
    import { RenderPass } from "https://esm.sh/three@0.136.0/examples/jsm/postprocessing/RenderPass.js";
    import { ShaderPass } from "https://esm.sh/three@0.136.0/examples/jsm/postprocessing/ShaderPass.js";
    import { UnrealBloomPass } from "https://esm.sh/three@0.136.0/examples/jsm/postprocessing/UnrealBloomPass.js";

    let scene, camera, renderer, composer, controls;
    let world, bodies, mouseBall, mouseLight;
    const sceneMiddle = new THREE.Vector3(0, 0, 0);
    let mousePos = new THREE.Vector2();

    const numBodies = 100;

    // Ball settings
    const ballSettings = {
      color: "#ffd3b6",
      glowColor: "#ffd3b6",
      glowIntensity: 3
    };

    const textureLoader = new THREE.TextureLoader();
    const matcap = textureLoader.load(
      "https://pbs.twimg.com/media/EQVip4yU4AENYb3.png"
    );

    // Grain Shader
    const grainShader = {
      uniforms: {
        tDiffuse: { value: null },
        amount: { value: 0.1 }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
        }
      `,
      fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform float amount;
        varying vec2 vUv;
        float random(vec2 co) {
          return fract(sin(dot(co.xy, vec2(12.9898,78.233))) * 43758.5453);
        }
        void main() {
          vec4 color = texture2D(tDiffuse, vUv);
          float grain = random(vUv + amount) * amount;
          gl_FragColor = color + vec4(grain, grain, grain, 0.0);
        }
      `
    };

    // Grayscale Shader
    const grayscaleShader = {
      uniforms: {
        tDiffuse: { value: null },
        amount: { value: 0.0 }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
        }
      `,
      fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform float amount;
        varying vec2 vUv;
        void main() {
          vec4 color = texture2D(tDiffuse, vUv);
          float gray = dot(color.rgb, vec3(0.299, 0.587, 0.114));
          gl_FragColor = vec4(mix(color.rgb, vec3(gray), amount), color.a);
        }
      `
    };

    async function init() {
      await RAPIER.init();

      // Scene setup
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.z = 4;

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Post-processing setup
      const renderScene = new RenderPass(scene, camera);
      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        2.5,
        0.4,
        0.2
      );
      const grainPass = new ShaderPass(grainShader);
      const grayscalePass = new ShaderPass(grayscaleShader);

      composer = new EffectComposer(renderer);
      composer.addPass(renderScene);
      composer.addPass(bloomPass);
      composer.addPass(grainPass);
      composer.addPass(grayscalePass);

      // Lighting setup
      const hemiLight = new THREE.HemisphereLight(0x00bbff, 0xaa00ff, 0.5);
      scene.add(hemiLight);

      // Controls
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableZoom = true;
      controls.zoomSpeed = 1.2;

      // Physics world setup
      const gravity = { x: 0.0, y: 0, z: 0.0 };
      world = new RAPIER.World(gravity);

      // Create bodies
      bodies = [];
      for (let i = 0; i < numBodies; i++) {
        const body = createBody(RAPIER, world);
        bodies.push(body);
        scene.add(body.mesh);
      }

      // Create mouse ball with light
      mouseBall = createMouseBall(RAPIER, world);
      scene.add(mouseBall.mesh);

      // Event listeners
      window.addEventListener("resize", onWindowResize, false);
      window.addEventListener("mousemove", onMouseMove, false);

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);
      world.step();

      // Update bodies and mouse ball
      bodies.forEach((b) => b.update());
      mouseBall.update(mousePos);

      // Render scene with post-processing
      composer.render();

      // Update controls
      controls.update();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    }

    function onMouseMove(event) {
      mousePos.x = (event.clientX / window.innerWidth) * 2 - 1;
      mousePos.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    function createBody(RAPIER, world) {
      const size = 0.1 + Math.random() * 0.25;
      const range = 5;
      const density = size * 1.0;
      let x = Math.random() * range - range * 0.5;
      let y = Math.random() * range - range * 0.5 + 3;
      let z = Math.random() * range - range * 0.5;

      let rigidBodyDesc = RAPIER.RigidBodyDesc.dynamic().setTranslation(x, y, z);
      let rigid = world.createRigidBody(rigidBodyDesc);
      let colliderDesc = RAPIER.ColliderDesc.ball(size).setDensity(density);
      world.createCollider(colliderDesc, rigid);

      const geometry = new THREE.IcosahedronGeometry(size, 1);
      const material = new THREE.MeshMatcapMaterial({
        matcap: matcap
      });
      const mesh = new THREE.Mesh(geometry, material);

      function update() {
        rigid.resetForces(true);
        let { x, y, z } = rigid.translation();
        let pos = new THREE.Vector3(x, y, z);
        let dir = pos.clone().sub(sceneMiddle).normalize();
        rigid.addForce(dir.multiplyScalar(-0.5), true);
        mesh.position.set(x, y, z);
      }

      return { mesh, rigid, update };
    }

    function createMouseBall(RAPIER, world) {
      const mouseSize = 0.25;
      const geometry = new THREE.IcosahedronGeometry(mouseSize, 8);
      const material = new THREE.MeshStandardMaterial({
        color: ballSettings.color,
        emissive: ballSettings.color
      });
      const mouseMesh = new THREE.Mesh(geometry, material);

      mouseLight = new THREE.PointLight(
        ballSettings.glowColor,
        ballSettings.glowIntensity,
        15,
        1.5
      );
      mouseMesh.add(mouseLight);

      let bodyDesc = RAPIER.RigidBodyDesc.kinematicPositionBased().setTranslation(
        0,
        0,
        0
      );
      let mouseRigid = world.createRigidBody(bodyDesc);
      let colliderDesc = RAPIER.ColliderDesc.ball(mouseSize * 3.0);
      world.createCollider(colliderDesc, mouseRigid);

      function update(mousePos) {
        const targetX = mousePos.x * 5;
        const targetY = mousePos.y * 5;
        mouseRigid.setTranslation({ x: targetX, y: targetY, z: 0.2 });
        const { x, y, z } = mouseRigid.translation();
        mouseMesh.position.set(x, y, z);
      }

      return { mesh: mouseMesh, update };
    }

    init();
  </script>
</body>
</html>
