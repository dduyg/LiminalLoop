<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Overpass+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Overpass Mono", monospace;
            color: #00FF41;
            background-color: #1A1A1D;
            background-image: url('backed.jpg');
            background-size: cover;
            background-attachment: fixed;
        }
        header {
            text-align: right;
            padding: 1.2rem;
            background: rgba(0, 0, 0, 0.4);
        }
        header h1 {
            font-size: 2.1rem;
            font-family: "Inconsolata", monospace;
            margin: 0;
            padding: 0;
            animation: glitch 1s infinite;
        }
        @keyframes glitch {
            0% {text-shadow: 2px 2px 0 #FF00C1, -2px -2px 0 #00FF41;}
            20% {text-shadow: -2px 2px 0 #FF00C1, 2px -2px 0 #00FF41;}
            40% {text-shadow: 2px -2px 0 #FF00C1, -2px 2px 0 #00FF41;}
            60% {text-shadow: -2px -2px 0 #FF00C1, 2px 2px 0 #00FF41;}
            80% {text-shadow: 2px 2px 0 #FF00C1, -2px -2px 0 #00FF41;}
            100% {text-shadow: -2px 2px 0 #FF00C1, 2px -2px 0 #00FF41;}
        }
        main {
            padding: 2rem;
            background: rgba(0, 0, 0, 0.4);
            margin: 2rem;
            border-radius: 0.7rem;
        }
        main h2 {
            text-align: center;
            font-size: 2em;
        }
        section {
            margin: 15px 0;
            padding: 1.25rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>/dduyg</h1>
    </header>
    <main>
        <h2>Works</h2>
        
        <section>Lorem ipsum dolor sit amet, morbi nec est et nulla egestas...</section>
      
    </main>
    <footer>
        &copy;2024 / d d u y g.
    </footer>
</body>
</html>
