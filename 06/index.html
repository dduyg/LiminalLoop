<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background-color: #7B919C;
            color: #000;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100%;
            position: relative;
        }
        h1, h2, h3, h4, h5, h6 {
            color: #00ff00;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 60px; /* Adjust as per your footer height */
            min-height: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #00ff00;
            color: #000;
            position: relative;
        }
        .icon {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px; /* Set your footer height */
            line-height: 60px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Your Name</h1>
    <h2>Portfolio</h2>
    <h3>About Me</h3>
    <p>Add your bio here.</p>
    
    <h3>Python vs R Naming Conventions Comparison</h3>
    <table>
        <tr>
            <th>Python <i class="fab fa-python icon"></i></th>
            <th>R <i class="fab fa-r-project icon"></i></th>
        </tr>
        <tr>
            <td>snake_case</td>
            <td>camelCase</td>
        </tr>
        <!-- Add more rows as needed -->
    </table>
</div>

<footer>
    Your footer content goes here.
</footer>

</body>
</html>
