<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Webpage</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background-color: #6A00FF;
            padding: 20px 0;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
        }

        footer {
            background-color: #6A00FF;
            padding: 20px 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>

<body>
    <header>
        <h1>Whichever</h1>
    </header>
    <main>
        <section>
            <h2>About Me</h2>
            <p>I'm fascinated with information theory and enjoy exploring its intricacies and applications.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Whichever. All rights reserved.</p>
    </footer>
</body>

</html>
