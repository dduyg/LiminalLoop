<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Webpage</title>
    <style>
        *, *:before, *:after { box-sizing: inherit; user-select: inherit; touch-action: inherit; backface-visibility: inherit; -webkit-tap-highlight-color: inherit; }
        * { margin: 0; padding: 0; }
        html { box-sizing: border-box; line-height: 1; -webkit-tap-highlight-color: rgba(0, 0, 0, 0); }
        main, canvas { display: block; }
        img, svg, video { display: block; width: 100%; height: auto; }
        svg { user-select: none; pointer-events: none; }
        h1, h2, h3, h4, h5, h6 { font: inherit; }
        a { color: inherit; text-decoration: none; }
        ol, ul { list-style: none; }
        input, button, select, textarea { appearance: none; border: none; background: none; color: inherit; font: inherit; }
        :root {
            --c-black: #000;
            --c-white: #fff;
            --c-dark-gray: hsla(0deg, 0%, 100%, 10%);
            --c-gray: hsla(0deg, 0%, 100%, 50%);
            --fs-text: 11px;
            --fs-jp-text: 13px;
        }
        @media(min-width: 960px) {
            :root { --fs-text: 12px; --fs-jp-text: 14px; }
        }
        @media(min-width: 1280px) {
            :root { --fs-jp-text: 16px; }
        }
        body {
            background-color: var(--c-black);
            color: var(--c-white);
            font-family: "PP Neue Montreal Mono", sans-serif;
            font-weight: 400;
            font-size: var(--fs-text);
            text-size-adjust: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .grid {
            display: flex;
            column-gap: var(--gutter);
            position: fixed;
            top: 0; left: var(--margin);
            right: var(--margin); bottom: 0;
            z-index: 2;
        }
        .grid_column {
            width: var(--column);
            height: 100%;
            border-left: 1px solid var(--c-dark-gray);
            border-right: 1px solid var(--c-dark-gray);
        }
        .siteHeader {
            position: fixed;
            top: 0;
            left: var(--margin); right: var(--margin);
            padding-top: 10px;
            z-index: 4;
        }
        .count {
            position: fixed;
            top: 50%;
            left: calc(var(--margin) * 0.5);
            transform: translate(-50%, -50%) rotate(-90deg);
        }
        #Loading {
            position: fixed;
            z-index: 9999;
            left: 0; top: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #Loading .bar {
            width: calc(100% - 4px);
            height: 2px;
            background-color: var(--c-dark-gray);
        }
        @keyframes loading-bar {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(0); }
            100% { transform: translateX(100%); }
        }
        #Loading .bar::after {
            content: "";
            display: block;
            width: 100%;
            height: 100%;
            background-color: currentColor;
            animation: loading-bar 2s cubic-bezier(0.3, 0.1, 0.1, 1) infinite forwards;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="grid_column"></div>
        <div class="grid_column"></div>
        <div class="grid_column"></div>
    </div>

    <header class="siteHeader">
        <h1>Minimalist Design</h1>
        <p>Responsive grid-based layout</p>
    </header>

    <section id="Loading">
        <div class="bar"></div>
    </section>

    <main>
        <p>This is a minimal webpage design inspired by modern layout practices.</p>
    </main>
</body>
</html>
