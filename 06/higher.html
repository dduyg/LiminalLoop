<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNDER VOYAGER - Replica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "PP Neue Montreal Mono", sans-serif;
            font-size: 11px;
            font-feature-settings: "palt";
            font-synthesis: none;
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior: none;

            background-image: url('detail-3.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        @media (min-width: 960px) {
            body { font-size: 12px; }
        }
        @media (min-width: 1280px) {
            body { font-size: 16px;}
        }
        ::selection {
            background-color: #0008ff;
            color: #fff;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        p {
            margin-bottom: 15px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        
        /* Grid from your additional CSS */
        .grid {
            position: fixed;
            z-index: 2;
            left: var(--margin);
            right: var(--margin);
            top: 0;
            bottom: 0;
            display: flex;
            column-gap: var(--gutter);
            pointer-events: none;
        }
        .grid_column {
            width: var(--column);
            height: 100%;
            border-left: 1px solid hsla(0deg 0% 100% / 10%);
            border-right: 1px solid hsla(0deg 0% 100% / 10%);
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
        
    <section class="container">
        <div class="item">
            <h2>Concept</h2>
            <p>The gallery represents the exploration of the character's spirit...</p>
        </div>
        <div class="item">
            <h2>Exhibition</h2>
            <p>A deep dive into the world of Laika, a girl lost in space...</p>
        </div>
    </section>

</body>
</html>
