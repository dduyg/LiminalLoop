<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNDER VOYAGER - Replica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            color: white;
        }
        .hero {
            background-image: url('your-background-image.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
        }
        .text-content {
            position: relative;
            z-index: 1;
            padding: 20px;
            text-align: left;
        }
        h1 {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        p {
            margin-bottom: 15px;
        }
        .date-info {
            position: absolute;
            right: 20px;
            bottom: 20px;
            text-align: right;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }
            .hero {
                height: auto;
                padding: 40px 0;
            }
            .date-info {
                position: static;
                text-align: center;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="overlay"></div>
        <div class="text-content">
            <h1>UNDER VOYAGER</h1>
            <p>MIKA PIKAZO SOLO EXHIBITION</p>
            <p>PROLOGUE: The journey begins...</p>
            <div class="date-info">
                <p>(START)<br>05.10</p>
                <p>(END)<br>06.01</p>
            </div>
        </div>
    </section>

    <section class="container">
        <div class="item">
            <h2>Concept</h2>
            <p>The gallery represents the exploration of the character's spirit...</p>
        </div>
        <div class="item">
            <h2>Exhibition</h2>
            <p>A deep dive into the world of Laika, a girl lost in space...</p>
        </div>
    </section>

</body>
</html>
