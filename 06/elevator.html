<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            overflow: hidden; /* Prevent scrolling */
            background-image: url('elevator.jpg');
            background-size: cover; /* Cover the entire viewport */
            background-position: center;
            color: #fff;
            font-family: "Inconsolata", monospace;
            line-height: 1.5;
        }
        main {
            display: grid;
            grid-template-columns: 9fr 1fr; /* First column 90%, second column 10% */
            height: 100vh;
        }
        section {
            padding: 3em 1.2rem;
            border-right: 1px solid hsla(0deg 0% 100% / 10%);
        }
        #credits {
            border-right: none;
            font-family: "VT323", monospace;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: right;
        }
    </style>
</head>
<body>
<main>
    <section id="info">
        <h2>TVVIN_PINEZ_M4LL</h2>
        <h3>HiddenContent</h3>
        <p>.</p>
    </section>

    <section id="credits">
        <p>I can't breath in this mess,</p>
        <br>
        <p>(START)<br>● 06.06</p>
        <p>(END)<br>▲ 28.08</p>
    </section>
</main>
</body>
</html>
