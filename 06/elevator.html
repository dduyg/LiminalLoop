<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            overflow: hidden; /* Prevent scrolling */
            background-image: url('elevator.png');
            background-size: cover; /* Cover the entire viewport */
            background-position: center;
            color: white;
        }
        main {
            display: grid;
            grid-template-columns: 9fr 1fr; /* First column 90%, second column 10% */
            height: 100vh;
        }
        section {
            padding: 12px;
            border-right: 1px solid hsla(0deg 0% 100% / 10%);
        }
        #credits {
            border-right: none;
        }
    </style>
</head>
<body>
<main>
    <section id="info">
        <h2>Column 1 (90%)</h2>
        <p>This is the first column taking 90% of the width.</p>
    </section>

    <section id="credits">
        <h2>Column 2 (10%)</h2>
        <p>This is the second column taking 10% of the width.</p>
    </section>
</main>
</body>
</html>
