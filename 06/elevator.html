<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        ::selection {
            background-color: black;
            color: #fff;
        }
        html, body {
            height: 100%;
            overflow: hidden; /* Prevent scrolling */
            background-image: url('elevator.jpg');
            background-size: cover; /* Cover the entire viewport */
            background-position: center;
            color: white;
            font-family: "Roboto Mono", monospace;
            line-height: 1.5;
            font-size: 0.9rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        main {
            display: grid;
            grid-template-columns: 9fr 1fr; /* First column 90%, second column 10% */
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.3);
        }
        section {
            padding: 3em 1.2rem;
            border-right: 1px solid hsla(0deg 0% 100% / 10%);
        }
        #credits {
            border-right: none;
            font-family: "VT323", monospace;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: right;
            padding-left: 2rem;
            padding-right: 2rem;
        }
        #info h2 {
            font-family: "VT323", monospace;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        a:hover {
            font-weight: bold;
            border-radius: 5px;
            background-color: black;
            padding: 5px 10px;
        }
    </style>
</head>
<body>
<main>
    <section id="info">
        <h2>TVVIN_PINEZ_M4LL</h2>
        <h3>HiddenContent</h3>
        <p>The gallery represents the exploration of the character's spirit.</p>
        <p>A deep dive into the world of Laika, a girl lost in space...</p>
    </section>

    <section id="credits">
        <p>I can't breath in this mess,</p>
        <br>
        <p><a href="#">(START)</a><br>06.06</p>
        ●
        <p>(END)<br>28.08</p>
        ▲
    </section>
</main>
</body>
</html>
