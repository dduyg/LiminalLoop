<!DOCTYPE html>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('detail-4.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
      
        .card {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 10px;
            max-width: 80%;
            border: 2px solid #ff77ff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5em;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }
        .card .footer {
            margin-top: 2em;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Your Name</h1>
