<!DOCTYPE html>
<html lang="en">
<head>

    <title>LiminalLoop</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #7a7e7e;

        .container {

        }

        .menu {
            background-color: #7a7e7e;
            color: black;

        }

        .menu a {
            display: block;
            color: black;
            text-decoration: none;

        }

        .menu a:hover {

        }

        .menu p {
            color: black;
            font-size: 1em;
            margin: 10px 0;
        }

        .menu .social-media a {
            font-size: 1em;
            margin-bottom: 5px;
        }

            margin-top: 20px;
            padding-top: 20px;
        }

<body>
    <div class="menu">
        <a href="#">Books</a>
        <a href="#">Information</a>

            <p>書店・学校様へ</p>

            <div class="social-media">
