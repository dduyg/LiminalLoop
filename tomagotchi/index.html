<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #2b2d42;
            color: #edf2f4;
            text-align: center;
            padding: 50px;
            margin: 0;
            background-image: linear-gradient(to right, #ffafbd, #ffc3a0);
        }
        h1 {
            font-size: 4em;
            margin: 0;
            color: #8d99ae;
        }
        p {
            font-size: 1.5em;
            margin: 20px 0;
            color: #ef233c;
        }
        a {
            color: #d90429;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #8d99ae;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        a:hover {
            background-color: #8d99ae;
            color: #2b2d42;
        }
        footer {
            margin-top: 40px;
            font-size: 0.9em;
            color: #8d99ae;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>Oops! This page has vaporized into the ether!</p>
    <p>It seems like you’re lost in the digital cosmos.</p>
    <a href="/contact">Contact Us</a>
    <footer>
        <p>© 2024 Your Website Name. All Rights Reserved.</p>
    </footer>
</body>
</html>
