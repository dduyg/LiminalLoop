<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }
        main {
            margin: 0 auto;
            padding: 1.25em;
            max-width: 800px;
        }
        a {
            color: #888;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        a:hover {
            color: #333;
        }
        .breadcrumb-container {
            display: flex;
            flex-wrap: wrap;
            margin: 1rem 0 0 0;
        }
        .breadcrumb-item {
            font-size: 0.85rem;
            letter-spacing: 0.125rem;
            text-transform: uppercase;
            position: relative; /* Allow for the pseudo-element */
        }
        .breadcrumb-item.active {
            color: #333;
        }
        .breadcrumb-item + .breadcrumb-item::before {
            content: "/";
            display: inline-block;
            padding: 0 0.5rem;
            color: #d5d5d5;
            position: absolute; /* Position it relative to the item */
            left: -0.5rem; /* Adjust as needed */
        }
    </style>
</head>
<body>
<main>
    <div class="breadcrumb-container">
        <div class="breadcrumb-item"><a href="#">Home</a></div>
        <div class="breadcrumb-item"><a href="#">Household Plants</a></div>
        <div class="breadcrumb-item active">Bonsai</div>
    </div>
</main>
</body>
</html>
