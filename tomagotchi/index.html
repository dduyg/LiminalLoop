<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }
        main {
            margin: 0 auto;
            padding: 1.25em;
            max-width: 800px;
        }
        .breadcrumb {
            display: flex;
            flex-wrap: wrap;
            padding: 0;
            margin: 1rem 0 0 0;
        }
        .breadcrumb-item {
            font-size: 0.85rem;
            letter-spacing: 0.125rem;
            text-transform: uppercase;
            color: #888;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .breadcrumb-item:hover {
            color: #333;
        }
        .breadcrumb-item.active {
            font-size: 2em;          /* Updated font size for active item */
            font-weight: bold;       /* Set font weight to bold */
            text-transform: none;    /* Remove uppercase transformation */
            display: block;          /* Make the active item appear on the next line */
            margin-top: 0.5rem;     /* Add some space above the active item */
            color: #333;             /* Keep the color for active item */
        }
        .breadcrumb-item + .breadcrumb-item::before {
            content: "/";
            display: inline-block;
            padding: 0 0.5rem;
            color: #d5d5d5;
        }
    </style>
</head>
<body>
<main>
    <div class="breadcrumb">
        <a href="#" class="breadcrumb-item">Home</a>
        <a href="#" class="breadcrumb-item">Posts</a>
        <span class="breadcrumb-item active">Bonsai</span>
    </div>
</main>
</body>
</html>
