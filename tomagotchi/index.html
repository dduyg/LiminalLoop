<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Tilt+Neon&display=swap" rel="stylesheet"> 
    <style>
        body {
            font-family: "Tilt Neon", sans-serif;
            background-color: #2b2d42;
            color: #ef233c;
            text-align: center;
            line-height: 1.5;
            padding: 50px;
            margin: 0;
            background-image: linear-gradient(to right, #ffafbd, #ffc3a0);
        }
        h1 {
            margin: 0;
            color: #8d99ae;
        }
        a {
            color: #d90429;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        a:hover {
            color: #8d99ae;
        }
        a.turbulence:hover {
            filter: url("#turbulenceFilter");
        }
        a.vertical-blur:hover {
            filter: url("#verticalBlurFilter");
        }
        footer {
            margin-top: 140px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>Oops! This page has vaporized into the ether!</p>
    <p>It seems like you’re lost in the digital cosmos.</p>
    <a href="/contact">Contact Us</a>
    <footer>
        <p>© 2024 Your Website Name. All Rights Reserved.</p>
    </footer>
</body>
</html>
