<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Liminal Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">       
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
            background: #4B1219;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #A8D3DA;
        }

        main {
            max-width: 80%;
            margin: 0 auto;
        }

        .contactForm_btnWrap {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            margin-top: 30px;
        }
        @media(min-width: 960px) {
            .contactForm_btnWrap {
                margin-top: 40px;
                padding-left:160px;
            }
        }
        .contactForm_btn {
            width: 100%;
            height: 80px;
            border-radius: 4px;
            background-color:#000;
            color: #fff;
            font-size: 15px;
            cursor:pointer;
        }
        @media(min-width: 960px) {
            .contactForm_btn {
                height: 100px;
                font-size:20px;
            }
        }
        button {
            appearance: none;
            margin: 0; 
            padding: 0;
            border:none;
            border-radius:0;
            background:none;
            outline:none;
        }

        .btn2 {
            width:100%;
            display:flex;
            justify-content:center;
            border-radius:9999px; 
            text-align:center;
            letter-spacing:-.01em;
            line-height:1;
            padding-top: 2rem;
            padding-bottom:2rem; 
            margin-bottom:3.5rem;
            background-color: red;
            color: black;       
        }
        @media(min-width: 960px) {
            .btn2 {
                padding-top:3rem;
                padding-bottom:3.2rem;
            }
        }   
    </style>
</head>
<body>
    <main>
        <header>
            <h1>The OBLIVION of the past,</h1>
        </header>

        <div class="contactForm_btnWrap">
            <button class="contactForm_btn" type="submit" value="check" x-show="step === 0">確認</button>
        </div>

        <button class="btn2"type="submit"data-default-message="Submit"data-loading-message="Submitting…">Submit</button>
    </main>
</body>
</html>
