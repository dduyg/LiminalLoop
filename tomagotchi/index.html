<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Liminal Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">       
    <style>
         :root {
            --base_fsize: clamp(1.125rem,4vw,1.4375rem);
            --small_fsize: clamp(1rem,3.25vw,1.125rem);
            --base_lheight: 1.4736842105;
         }
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
            background: #4B1219;
            color: #A8D3DA;
        }
        main {
            max-width: 80%;
            margin: 80px auto;
        }

        .contactForm_btnWrap {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            margin-top: 30px;
        }
        .contactForm_btn {
            width: 100%;
            height: 80px;
            border-radius: 4px;
            background-color:#000;
            color: #fff;
            font-size: 15px;
            cursor:pointer;
        }
        @media(min-width: 960px) {
            .contactForm_btn {
                height: 100px;
                font-size:20px;
            }
        }
        button {
            appearance: none;
            margin: 0; 
            padding: 0;
            border:none;
            border-radius:0;
            background:none;
            outline:none;
        }

        .btn2 {
            width:100%;
            display:flex;
            justify-content:center;
            border-radius:9999px; 
            text-align:center;
            letter-spacing:-.01em;
            line-height:1;
            padding-top: 2rem;
            padding-bottom:2rem; 
            margin-bottom:3.5rem;
            background-color: red;
            color: black;       
        }
        @media(min-width: 960px) {
            .btn2 {
                padding-top:3rem;
                padding-bottom:3.2rem;
            }
        }
        
        footer {
           display: flex;
           font-family: Fantasque,monospace;
           font-size: var(--small_fsize);
           line-height: 1.3888888889;
           opacity: .6;
       }
       .flex-auto {
           flex:1 1 auto;
       }  
    </style>
</head>
<body>
    <main>
        <header>
            <h1>The OBLIVION of the past,</h1>
        </header>

        <div class="contactForm_btnWrap">
            <button class="contactForm_btn" type="submit" value="check" x-show="step === 0">確認</button>
        </div>

        <button class="btn2"type="submit"data-default-message="Submit"data-loading-message="Submitting…">Submit</button>
        
        <footer>
            <div class="flex-auto">
                <span>design, </span><span>resources</span>
            </div>
            <span class>Sep 10, 2024</span>
        </footer>
    </main>
</body>
</html>
