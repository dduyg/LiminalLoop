<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Liminal Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">       
    <style>
        @font-face {
            font-family: 'Pentameter Light';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Pentameter-Wide-Light.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Pentameter Thin';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Pentameter-Wide-Thin.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Pentameter ExtraLight';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Pentameter-Wide-ExtraLight.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        
        body {
            margin: 0;
            padding: 1.2rem;
            font-family: "Poppins", sans-serif;
            background: #4B1219;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #A8D3DA;
        }

        header h1 {
            font-family: 'Pentameter Light', 'Fira Sans', sans-serif;
        }
        nav h1 {
            font-family: 'Pentameter Thin', 'Fira Sans', sans-serif;
        }
        footer h1 {
            font-family: 'Pentameter ExtraLight', 'Fira Sans', sans-serif;
        }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>The OBLIVION of the past,</h1>
        </header>
        <nav>
            <h1>The OBLIVION of the past,</h1>
        </nav>
        <footer>
            <h1>The OBLIVION of the past,</h1>
        </footer>
    </main>
</body>
</html>
