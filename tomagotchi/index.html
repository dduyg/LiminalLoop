<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <style>
        /* General Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #1e1e1e;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.contact-container {
    background-color: #1e1e1e;
    padding: 2rem;
    width: 90%;
    max-width: 600px;
    border: 1px solid #333;
}

.header {
    text-align: center;
    margin-bottom: 1.5rem;
}

.header h1 {
    font-size: 3rem;
    color: #000;
    background-color: #d3d3d3;
    padding: 0.5rem;
    margin-bottom: 1rem;
}

.header p {
    font-size: 1.2rem;
    color: #fff;
}

.header a {
    color: #fff;
    text-decoration: none;
    font-size: 1.2rem;
    display: block;
    margin-top: 0.5rem;
}

.contact-form {
    display: flex;
    flex-direction: column;
}

.form-row {
    display: flex;
    flex-wrap: wrap;
    margin-bottom: 1rem;
}

.form-group {
    flex: 1;
    margin-right: 1rem;
    margin-bottom: 1rem;
}

.form-group:last-child {
    margin-right: 0;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: #fff;
    font-size: 1rem;
}

.form-group input, 
.form-group textarea {
    width: 100%;
    padding: 0.75rem;
    background-color: #333;
    border: 1px solid #555;
    color: #fff;
    font-size: 1rem;
}

.form-group textarea {
    height: 100px;
}

.captcha {
    display: flex;
    align-items: center;
}

.captcha input {
    margin-right: 0.5rem;
}

.submit-row {
    text-align: center;
}

.submit-row button {
    background-color: #4a00e0;
    color: #fff;
    padding: 1rem 2rem;
    font-size: 1.2rem;
    border: none;
    cursor: pointer;
    width: 100%;
    transition: background-color 0.3s ease;
}

.submit-row button:hover {
    background-color: #3700b3;
}

/* Responsive Design */
@media (min-width: 768px) {
    .contact-container {
        max-width: 900px;
    }

    .form-row {
        justify-content: space-between;
    }

    .form-group {
        margin-right: 1.5rem;
    }

    .submit-row button {
        width: auto;
    }
}
    </style>
</head>
<body>
    <div class="contact-container">
        <div class="header">
            <h1>Say Hello</h1>
            <p>Looking for a partner for your next project? Say hello, we’d love to hear from you.</p>
            <a href="mailto:hello@non-linear.studio">hello@non-linear.studio</a>
        </div>

        <form class="contact-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" name="first-name" required>
                </div>
                <div class="form-group">
                    <label for="company">Company</label>
                    <input type="text" id="company" name="company">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="budget">Budget</label>
                    <input type="text" id="budget" name="budget" required>
                </div>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
            </div>

            <div class="form-group captcha">
                <input type="checkbox" id="captcha" name="captcha" required>
                <label for="captcha">I'm a human (Captcha)</label>
            </div>

            <div class="submit-row">
                <button type="submit">Submit</button>
            </div>
        </form>
    </div>
</body>
</html>
