<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
      * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: Arial, sans-serif;
    background-color: #0d0d0d;
    color: #ffffff;
}

.contact-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    background-color: #1c1c1c;
}

.heading {
    text-align: left;
    margin-bottom: 30px;
}

.heading h1 {
    font-size: 3rem;
    color: #ffffff;
}

.heading p {
    font-size: 1.1rem;
    color: #ffffff;
}

.heading a {
    color: #cccccc;
    text-decoration: none;
}

.contact-form {
    display: flex;
    flex-direction: column;
}

.form-row {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.full-width {
    width: 100%;
}

.form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.form-group label {
    font-size: 1rem;
    margin-bottom: 10px;
}

.form-group input,
.form-group textarea {
    padding: 10px;
    font-size: 1rem;
    border: none;
    border-radius: 4px;
    background-color: #2b2b2b;
    color: #ffffff;
}

.form-group span {
    font-size: 0.85rem;
    color: #888888;
}

.captcha-row {
    display: flex;
    align-items: center;
}

.captcha-row input {
    margin-right: 10px;
}

.submit-row {
    display: flex;
    justify-content: flex-end;
}

.submit-row input {
    background-color: #4a38ff;
    color: white;
    border: none;
    padding: 12px 20px;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 4px;
}

.submit-row input:hover {
    background-color: #3a29d3;
}

@media (max-width: 768px) {
    .form-row {
        flex-direction: column;
    }

    .form-row.full-width {
        width: 100%;
    }

    .submit-row {
        justify-content: center;
    }
}
    </style>
</head>
<body>
    <div class="contact-container">
        <div class="heading">
            <h1>Say Hello</h1>
            <p>Looking for a partner for your next project? Say hello, we'd love to hear from you.</p>
            <a href="mailto:hello@non-linear.studio">hello@non-linear.studio</a>
        </div>
        
        <form action="#" method="POST" class="contact-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="first-name">First Name <span>*Required</span></label>
                    <input type="text" id="first-name" name="first-name" required>
                </div>
                <div class="form-group">
                    <label for="company">Company <span>(Optional)</span></label>
                    <input type="text" id="company" name="company">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email <span>*Required</span></label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="budget">Budget <span>*Required</span></label>
                    <input type="text" id="budget" name="budget" required>
                </div>
            </div>
            <div class="form-row full-width">
                <div class="form-group">
                    <label for="message">Message <span>*Required</span></label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
            </div>
            <div class="form-row captcha-row">
                <input type="checkbox" id="captcha" required>
                <label for="captcha">I'm a human (Captcha)</label>
            </div>
            <div class="form-row submit-row">
                <input type="submit" value="Submit">
            </div>
        </form>
    </div>

</body>
</html>
