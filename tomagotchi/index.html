<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            background-color: #ff77a1; /* Vaporwave pink */
            color: #fff; /* White text */
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        h1 {
            font-size: 3em;
            margin: 0;
        }
        p {
            font-size: 1.5em;
            margin: 10px 0;
        }
        a {
            color: #00ffff; /* Cyan link */
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #00ffff;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        a:hover {
            background-color: #00ffff; /* Cyan background on hover */
            color: #ff77a1; /* Pink text on hover */
        }
        .vaporwave {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.1;
            font-size: 20em;
            color: #ffcc00; /* Vaporwave yellow */
        }
    </style>
</head>
<body>
    <div class="vaporwave">404</div>
    <h1>Oops! This Page is a Mirage!</h1>
    <p>Looks like you've wandered off the neon path.</p>
    <p>Don't worry; even the best of us lose our way sometimes!</p>
    <a href="/sitemap.html">Check out the Site Map</a>
</body>
</html>
