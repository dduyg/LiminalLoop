<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            width:100%;
            height: 100vh;
            background: linear-gradient(-45deg, #c3cbd8, #c3dbce, #ddc3cd, #d0c2ad);
            color: #1737c0;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        main {
            max-width: 85%;
            margin: 0 auto;
            padding: 1rem;
        }
        a {
            color: #00ffff; /* Cyan link */
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #00ffff;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        a:hover {
            background-color: #00ffff; /* Cyan background on hover */
            color: #ff77a1; /* Pink text on hover */
        }
    </style>
</head>
<body>
<main>
    <div class="vaporwave">404</div>
    <p>Oops! This Page is a Mirage! Looks like you've wandered off the neon path. Don't worry; even the best of us lose our way sometimes!</p>
    <a href="/sitemap.html">Check out the Site Map</a>
</main>
</body>
</html>
