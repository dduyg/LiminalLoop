<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <style>
        /* Base styling */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f3f3f3;
    color: #000;
}

.contact-page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.header-section {
    text-align: center;
    margin-bottom: 40px;
}

.header-section h1 {
    font-size: 48px;
    margin: 0;
    color: #333;
}

.header-section p {
    margin: 10px 0;
    font-size: 18px;
    color: #666;
}

.header-section a {
    color: #0000ff;
    text-decoration: none;
}

.contact-form {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.form-group {
    flex: 1 1 45%;
}

.full-width {
    flex: 1 1 100%;
}

label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    color: #000;
}

input, textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 16px;
    background-color: #fff;
}

textarea {
    resize: none;
}

.captcha {
    display: flex;
    align-items: center;
}

.captcha label {
    margin-left: 10px;
}

.submit-btn {
    width: 100%;
    padding: 15px;
    background-color: #4b00ff;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
    text-align: center;
}

/* Responsive Design */
@media (max-width: 768px) {
    .header-section h1 {
        font-size: 32px;
    }

    .contact-form {
        flex-direction: column;
    }

    .form-group {
        flex: 1 1 100%;
    }
}
    </style>
</head>
<body>
    <div class="contact-page">
        <div class="header-section">
            <h1>Say Hello</h1>
            <p>Looking for a partner for your next project? Say hello, we’d love to hear from you.</p>
            <a href="mailto:hello@non-linear.studio">hello@non-linear.studio</a>
        </div>
        <form class="contact-form">
            <div class="form-group">
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" required>
            </div>
            <div class="form-group">
                <label for="company">Company</label>
                <input type="text" id="company">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="budget">Budget</label>
                <input type="text" id="budget" required>
            </div>
            <div class="form-group full-width">
                <label for="message">Message</label>
                <textarea id="message" rows="4" required></textarea>
            </div>
            <div class="captcha">
                <input type="checkbox" id="captcha" required>
                <label for="captcha">I'm a human (Captcha)</label>
            </div>
            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </div>
</body>
</html>
