<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Liminal Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@100..900&display=swap" rel="stylesheet">
    <style>
         :root {
            --base_fsize: clamp(1.125rem,4vw,1.4375rem);
            --small_fsize: clamp(1rem,3.25vw,1.125rem);
            --base_lheight: 1.4736842105;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: "Work Sans", sans-serif;
            background: #4B1219;
            color: #A8D3DA;
        }
        main {
            max-width: 80%;
            margin: 80px auto;
        }

        /* border-radius:9999px; */
        .contactForm_btn {
            width: 100%;
            height: 80px;
            border-radius: 4px;
            background-color:#000;
            color: #fff;
            font-size: 15px;
            cursor:pointer;
        }
        @media(min-width: 960px) {
            .contactForm_btn {
                height: 100px;
                font-size:20px;
            }
        }
        button {
            appearance: none;
            margin: 0; 
            padding: 0;
            border:none;
            border-radius:0;
            background:none;
            outline:none;
        }
        
        footer {
           display: flex;
           font-family: Fantasque,monospace;
           font-size: var(--small_fsize);
           line-height: 1.3888888889;
           opacity: .6;
       }
       .flex-auto {
           flex:1 1 auto;
       }  
    </style>
</head>
<body>
    <main>
        <header>
            <p>The gallery represents the exploration of the character's spirit.
            <br>A deep dive into the world of Laika, a girl lost in space...</p>
        </header>

        <button class="contactForm_btn" type="submit" value="check" x-show="step === 0">確認</button>

        <footer>
            <div class="flex-auto">
                <span>design, </span><span>resources</span>
            </div>
            <span class>Sep 10, 2024</span>
        </footer>
    </main>
</body>
</html>
