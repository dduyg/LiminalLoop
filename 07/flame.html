<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            background-color: #2e1a47;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 5rem;
            margin: 0;
            color: #ff6ec7;
        }
        p {
            font-size: 1.5rem;
            margin: 0;
        }
        .glitch {
            color: #00ffab;
            position: relative;
            display: inline-block;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            overflow: hidden;
            color: #ff6ec7;
        }
        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #00ffab;
            animation: glitch 1s infinite linear;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #ff6ec7;
            animation: glitch 1s infinite linear reverse;
        }
        @keyframes glitch {
            0% {
                clip: rect(42px, 9999px, 44px, 0);
            }
            5% {
                clip: rect(56px, 9999px, 29px, 0);
            }
            10% {
                clip: rect(76px, 9999px, 60px, 0);
            }
            15% {
                clip: rect(30px, 9999px, 72px, 0);
            }
            20% {
                clip: rect(61px, 9999px, 33px, 0);
            }
            25% {
                clip: rect(34px, 9999px, 78px, 0);
            }
            30% {
                clip: rect(56px, 9999px, 30px, 0);
            }
            35% {
                clip: rect(45px, 9999px, 63px, 0);
            }
            40% {
                clip: rect(79px, 9999px, 34px, 0);
            }
            45% {
                clip: rect(23px, 9999px, 45px, 0);
            }
            50% {
                clip: rect(65px, 9999px, 36px, 0);
            }
            55% {
                clip: rect(38px, 9999px, 58px, 0);
            }
            60% {
                clip: rect(71px, 9999px, 25px, 0);
            }
            65% {
                clip: rect(30px, 9999px, 77px, 0);
            }
            70% {
                clip: rect(53px, 9999px, 41px, 0);
            }
            75% {
                clip: rect(34px, 9999px, 71px, 0);
            }
            80% {
                clip: rect(66px, 9999px, 37px, 0);
            }
            85% {
                clip: rect(26px, 9999px, 65px, 0);
            }
            90% {
                clip: rect(56px, 9999px, 30px, 0);
            }
            95% {
                clip: rect(45px, 9999px, 75px, 0);
            }
            100% {
                clip: rect(42px, 9999px, 44px, 0);
            }
        }
        .neon-text {
            color: #00ffab;
            text-shadow: 0 0 10px #00ffab, 0 0 20px #00ffab, 0 0 30px #ff6ec7, 0 0 40px #ff6ec7, 0 0 50px #ff6ec7, 0 0 60px #ff6ec7, 0 0 70px #ff6ec7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="glitch" data-text="404">404</h1>
        <p class="neon-text">Oops! It seems you've taken a wrong turn in the vaporwave dimension.</p>
        <p>Don't worry, just hop on your digital skateboard and head back <a href="/" style="color:#ff6ec7;">home</a>.</p>
    </div>
</body>
</html>
