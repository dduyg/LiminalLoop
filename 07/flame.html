<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found</title>
    <style>
        body {
            background-color: #800080; /* Purple background */
            color: #ffffff; /* White text */
            font-family: 'Arial', sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 5em;
            margin-bottom: 0.5em;
        }
        p {
            font-size: 1.5em;
        }
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8em;
        }
        /* Vaporwave style */
        h1 {
            color: #00ff00; /* Neon green text */
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ff00ff, 0 0 40px #ff00ff, 0 0 50px #ff00ff, 0 0 60px #ff00ff, 0 0 70px #ff00ff;
        }
        p {
            color: #00ffff; /* Cyan text */
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ff00ff, 0 0 40px #ff00ff, 0 0 50px #ff00ff, 0 0 60px #ff00ff, 0 0 70px #ff00ff;
        }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>Oops! It seems you've ventured into the unknown...</p>
    </div>
    <div class="footer">
        <p>This page is lost in the digital vaporwave abyss.</p>
    </div>
</body>
</html>
