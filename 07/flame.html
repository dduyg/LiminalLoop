<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found</title>
    <style>
        body {
            background-color: #5f4b8b; /* Vaporwave background color */
            color: #e0d6e0; /* Vaporwave text color */
            font-family: 'Arial', sans-serif;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 600px;
            padding: 20px;
            background-color: #7d5a7e; /* Vaporwave container background color */
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        a {
            color: #fcb9fc; /* Vaporwave link color */
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404 Not Found</h1>
        <p>Oops! It seems you've ventured into the void of the Vaporwave...</p>
        <p>But fear not! You can <a href="/">return to safety</a> or just chill here for a while.</p>
        <p>Remember, even in the digital a e s t h e t i c, errors happen.</p>
    </div>
</body>
</html>
