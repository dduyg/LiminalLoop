<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff0099, #493240);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }
        .container {
            max-width: 600px;
        }
        .title {
            font-size: 5em;
            margin: 0;
        }
        .message {
            font-size: 1.5em;
            margin: 0.5em 0;
        }
        .back-home {
            margin-top: 2em;
            padding: 0.5em 1em;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            color: #fff;
            text-decoration: none;
            font-size: 1.2em;
            transition: background 0.3s, color 0.3s;
        }
        .back-home:hover {
            background: #fff;
            color: #ff0099;
        }
        .vaporwave {
            margin-top: 2em;
            font-size: 1.5em;
            color: #00ff99;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">404</h1>
        <p class="message">Uh-oh! You’ve ventured into the void. This page doesn't exist in this dimension.</p>
        <a href="/" class="back-home">Go Back to Reality</a>
        <div class="vaporwave">＼(＾O＾)／</div>
    </div>
</body>
</html
