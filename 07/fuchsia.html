<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Public+Sans&display=swap" rel="stylesheet">
    <style>
        body {

    <main>
        <img src="fuchsia.gif" class="logo">

        <section>Oops! This page seems to have evaporated into the digital void.</section>
