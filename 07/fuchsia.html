<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ffccf9, #c0caf5, #bceef6);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }
        h1 {
            font-size: 4em;
            margin: 0.2em 0;
        }
        p {
            font-size: 1.5em;
        }
        .logo {
            max-width: 150px;
            margin: 20px auto;
        }
        .button {
            background: #ff79c6;
            border: none;
            color: #fff;
            padding: 15px 25px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            transition: background 0.3s ease;
        }
        .button:hover {
            background: #ff92d0;
        }
        .neon {
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #ff00ff,
                0 0 30px #ff00ff,
                0 0 40px #ff00ff,
                0 0 50px #ff00ff,
                0 0 60px #ff00ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="your-logo.png" alt="Logo" class="logo">
        <h1 class="neon">404</h1>
        <p>Oops! This page seems to have evaporated into the digital void.</p>
        <button class="button" onclick="window.location.href='/'">Go Home</button>
    </div>
</body>
</html>
