<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            margin: 0;
            font-family: 'Courier New', monospace;
            background-color: #0f0c29;
            background-image: linear-gradient(315deg, #0f0c29 0%, #302b63 74%, #24243e 100%);
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 20px;
            border: 2px solid #8a3ab9;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(138, 58, 185, 0.5);
            background-color: rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 3rem;
            margin: 0;
        }
        p {
            font-size: 1.2rem;
        }
        img {
            max-width: 200px;
            margin-top: 20px;
        }
        a {
            color: #8a3ab9;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        a:hover {
            color: #f5f5f5;
        }
        .glitch {
            position: relative;
            display: inline-block;
            color: #f5f5f5;
            font-size: 3rem;
            text-transform: uppercase;
            font-weight: bold;
        }
        .glitch::before, .glitch::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            color: #8a3ab9;
            background: rgba(0, 0, 0, 0.1);
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            animation: glitch 2s infinite;
        }
        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff3eec;
            animation: glitch 2s infinite;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #0ff;
            animation: glitch 2s infinite reverse;
        }
        @keyframes glitch {
            0%, 2%, 4%, 8%, 16%, 32%, 64% {
                clip: rect(10px, 9999px, 150px, 0);
                transform: skew(0.5deg);
            }
            1% {
                clip: rect(85px, 9999px, 140px, 0);
                transform: skew(0.5deg);
            }
            3% {
                clip: rect(55px, 9999px, 80px, 0);
                transform: skew(0.5deg);
            }
            5% {
                clip: rect(0, 9999px, 130px, 0);
                transform: skew(0.5deg);
            }
            7% {
                clip: rect(15px, 9999px, 90px, 0);
                transform: skew(0.5deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="glitch">404</h1>
        <p>Oops! You seem to have wandered off into the digital abyss.</p>
        <p>Let's get you <a href="/">back to reality</a>.</p>
        <img src="path/to/your/logo.png" alt="Logo">
    </div>
</body>
</html>
