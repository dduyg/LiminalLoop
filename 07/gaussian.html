<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #777;
            color: #f0e5e5;
            font-family: "Andale Mono", monospace;
            line-height: 1.5;
        }
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2em;
        }
        h1 {
            font-size: 2.2em;
            text-transform: uppercase;
            margin: 0;
            animation: glitch 1.5s infinite;
        }
        p {
            font-size: 1.25em;
            margin: 20px 0;
        }
        code {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid black;
            padding: 0.2em;
            border-radius: 0.3em;
            font-weight: bold;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, 5px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
<main>
    <h1>gaussian</h1>
    <p>Oops! Looks like you're stuck in a time loop!</p>
    <p>It seems we've wandered off into the digital <code>abyss</code></p>
</main>
</body>
</html>
