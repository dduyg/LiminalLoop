<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ff77e9, #4f52de);
            color: #fff;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 6rem;
            margin: 0;
        }

        h2 {
            font-size: 2rem;
            margin: 10px 0;
        }

        p {
            font-size: 1.5rem;
            margin: 15px 0 30px;
        }

        .btn {
            padding: 15px 30px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            color: #fff;
            font-size: 1.2rem;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: rgba(255, 255, 255, 0.5);
        }

        .glitch {
            font-size: 3rem;
            color: #fff;
            position: relative;
            display: inline-block;
        }

        .glitch:before, .glitch:after {
            content: '404';
            position: absolute;
            left: 0;
            right: 0;
            opacity: 0.8;
        }

        .glitch:before {
            animation: glitch-anim 1s infinite linear alternate-reverse;
            top: -2px;
            left: -2px;
            color: #ff77e9;
        }

        .glitch:after {
            animation: glitch-anim 1s infinite linear alternate;
            top: 2px;
            left: 2px;
            color: #4f52de;
        }

        @keyframes glitch-anim {
            0% { clip: rect(24px, 9999px, 76px, 0); }
            25% { clip: rect(45px, 9999px, 32px, 0); }
            50% { clip: rect(10px, 9999px, 90px, 0); }
            75% { clip: rect(74px, 9999px, 100px, 0); }
            100% { clip: rect(36px, 9999px, 20px, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="glitch">404</h1>
        <h2>Oops! The page you're looking for has gone... retro!</h2>
        <p>Don't worry, it's not the end of the world. It's just the end of this page.</p>
        <button class="btn" onclick="history.back()">Go Back</button>
    </div>
</body>
</html>
