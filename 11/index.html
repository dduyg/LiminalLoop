<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ff77ff, #4b0082);
            color: #fff;
            font-family: "Nanum Gothic Coding", monospace;
            text-align: center;
            margin: 0;
            padding: 1em;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        h1 {
            font-size: 4em;
            margin: 0;
            animation: neon 1.5s infinite alternate;
        }
        p {
            font-size: 1.5em;
            margin: 20px 0;
        }
        a {
            text-decoration: none;
            color: #ffcc00;
            background-color: #1a1a1a;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        a:hover {
            background-color: #ffcc00;
            color: #1a1a1a;
        }
        @keyframes neon {
            0% { text-shadow: 0 0 5px #ffcc00, 0 0 10px #ffcc00; }
            100% { text-shadow: 0 0 10px #ff77ff, 0 0 20px #ff77ff; }
        }
        .vaporwave {
            position: relative;
            font-size: 0.8em;
            margin-top: 40px;
            color: #00ffff;
        }
        .vaporwave:before {
            content: '🌴 404 - The Page is Gone, Like My Hopes and Dreams 🌴';
            display: block;
            font-size: 1.2em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>Oops! This page doesn't exist.</p>
    <p class="vaporwave">But hey, you can always go back!</p>
    <a href="/">return</a>
</body>
</html>
