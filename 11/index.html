<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>4Lost in the Vaporwave</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff8fd1, #6d0cb3);
            color: white;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
            border-radius: 15px;
        }

        h1 {
            font-size: 3rem;
            color: #00e8c6;
            text-shadow: 2px 2px #ff6f91;
        }

        p {
            font-size: 1.5rem;
            margin: 20px 0;
            color: #eee;
        }

        .glitch {
            font-size: 1.2rem;
            color: #ff00d4;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: -2px 2px #ff00d4; }
            25% { text-shadow: 2px -2px #00e8c6; }
            50% { text-shadow: -2px 2px #ff00d4; }
            75% { text-shadow: 2px -2px #00e8c6; }
            100% { text-shadow: -2px 2px #ff00d4; }
        }

        button {
            background-color: #00e8c6;
            border: none;
            color: black;
            padding: 15px 30px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #ff00d4;
            color: white;
        }

        .vaporwave-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/4/4b/Vaporwave_Glitch_Grid.png');
            background-size: cover;
            z-index: -1;
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <div class="vaporwave-grid"></div>
    <div class="container">
        <h1>404: Page Not Found</h1>
        <p>Looks like you’re lost... <span class="glitch">in the vaporwave.</span></p>
        <p>Don’t worry, this digital dream is just a glitch in the matrix.</p>
        <button onclick="goBack()">Go Back</button>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
