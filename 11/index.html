<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Liminal Loop</title>
    <style>
        /* Vaporwave Color Scheme */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        h1 {
            font-size: 6rem;
            letter-spacing: 5px;
            margin: 0;
        }
        p {
            font-size: 1.5rem;
            margin: 10px 0;
        }
        a {
            font-size: 1.2rem;
            color: #ffcccb;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 25px;
            transition: background-color 0.3s ease;
        }
        a:hover {
            background-color: rgba(0, 0, 0, 0.6);
        }
        .container {
            position: relative;
            z-index: 10;
        }
        .glitch {
            font-size: 8rem;
            font-weight: bold;
            color: #fff;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            text-shadow: 2px 2px 0px #ff00ff, -2px -2px 0px #00ffff;
            animation: glitch 1s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(-50%, -50%) skew(0deg); }
            10% { transform: translate(-49%, -50%) skew(-3deg); }
            20% { transform: translate(-50%, -49%) skew(2deg); }
            30% { transform: translate(-50%, -50%) skew(0deg); }
            40% { transform: translate(-51%, -50%) skew(-1deg); }
            50% { transform: translate(-50%, -51%) skew(1deg); }
            60% { transform: translate(-50%, -50%) skew(0deg); }
            70% { transform: translate(-49%, -51%) skew(3deg); }
            80% { transform: translate(-50%, -50%) skew(-2deg); }
            90% { transform: translate(-51%, -50%) skew(2deg); }
            100% { transform: translate(-50%, -50%) skew(0deg); }
        }
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/dark-brick-wall.png');
            z-index: 0;
            opacity: 0.2;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <h1 class="glitch">404</h1>
        <p>Oops! Looks like you're lost in the digital abyss.</p>
        <p>Don't worry, we sent a search party... they just haven't come back yet.</p>
        <a href="/">Take me back to reality</a>
    </div>
</body>
</html>
