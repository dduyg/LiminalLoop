<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            color: #ffffff;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: linear-gradient(to bottom right, #ff77ff, #00ffff);
        }
        h1 {
            font-size: 4em;
            margin: 0;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.5);
        }
        p {
            font-size: 1.5em;
            margin: 20px 0;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.5);
        }
        .button {
            background-color: #ffffff;
            color: #333;
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #ff77ff;
        }
        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8em;
            color: #333;
        }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>Oops! This page is as lost as a vaporwave aesthetic in the wrong dimension.</p>
        <a href="/" class="button">Return to Homepage</a>
    </div>
    <footer>
        &copy; 2024 Your Company Name. All rights reserved.
    </footer>
</body>
</html>
