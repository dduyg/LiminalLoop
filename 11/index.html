<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            background-color: #2a2a72;
            background-image: linear-gradient(315deg, #2a2a72 0%, #009ffd 74%);
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-size: 100px;
            margin: 0;
        }
        p {
            font-size: 20px;
            margin: 20px 0;
        }
        a {
            text-decoration: none;
            color: #ffffff;
            background-color: #ff0080;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        a:hover {
            background-color: #ff4f81;
        }
        .vaporwave {
            font-family: 'Courier New', Courier, monospace;
            font-size: 40px;
            text-shadow: 0 0 5px #ff0080, 0 0 10px #ff0080;
        }
        .footer {
            margin-top: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p class="vaporwave">Oops! Page Not Found.</p>
    <p>Looks like you’ve stumbled into a glitch in the matrix.</p>
    <p>But don’t worry, the internet is a vast place!</p>
    <a href="/">Return to Homepage</a>
    <div class="footer">
        <p>Or check out our <a href="/contact">Contact Page</a> if you need assistance.</p>
    </div>
</body>
</html>
