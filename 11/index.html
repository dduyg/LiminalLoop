<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            background: linear-gradient(to bottom right, #ff77e9, #00d0ff);
            color: #fff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 50px;
            margin: 0;
        }
        h1 {
            font-size: 100px;
            margin: 0;
        }
        p {
            font-size: 24px;
            margin: 20px 0;
        }
        a {
            background-color: #ff3d00;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        a:hover {
            background-color: #e63900;
        }
        .container {
            position: relative;
            z-index: 1;
        }
        .vaporwave {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            font-weight: bold;
            filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.5));
        }
    </style>
</head>
<body>
    <div class="vaporwave">🌴 Welcome to the Retro Zone! 🌴</div>
    <div class="container">
        <h1>404</h1>
        <p>Oops! Looks like you’ve taken a wrong turn into the void.</p>
        <p>Don't worry; it happens to the best of us!</p>
        <a href="/">Return Home</a>
    </div>
</body>
</html>
