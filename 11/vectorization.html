<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Lost in the Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
            color: #00FF00;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 6rem;
            color: #00FF00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
            animation: glitch 2s infinite;
        }

        p {
            font-size: 1.5rem;
            margin-top: 20px;
            color: #00FF00;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.8);
            animation: typing 4s steps(40, end), blinkCaret 0.75s step-end infinite;
        }

        .container button {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: transparent;
            border: 2px solid #00FF00;
            border-radius: 5px;
            color: #00FF00;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
            animation: pulse 1.5s infinite;
        }

        .container button:hover {
            background: #00FF00;
            color: #000;
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.05),
                rgba(255, 255, 255, 0.05) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            animation: flicker 0.3s infinite;
        }

        .flicker-box {
            width: 50px;
            height: 50px;
            position: absolute;
            background: rgba(0, 255, 0, 0.3);
            border-radius: 50%;
            animation: flicker-box 3s infinite;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            25% { transform: skew(2deg, 5deg); }
            50% { transform: skew(0deg); }
            75% { transform: skew(-2deg, -5deg); }
            100% { transform: skew(0deg); }
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blinkCaret {
            from, to { border-color: transparent; }
            50% { border-color: #00FF00; }
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        @keyframes flicker-box {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Error: File not found.<br>Looks like the matrix glitched out.<br>Time to debug?</p>
        <button onclick="goHome()">Return to Reality</button>
    </div>

    <div class="scanline"></div>
    <div class="flicker-box" style="top: 20%; left: 30%;"></div>
    <div class="flicker-box" style="top: 70%; left: 60%;"></div>
    <div class="flicker-box" style="top: 50%; left: 50%;"></div>

    <script>
        function goHome() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
