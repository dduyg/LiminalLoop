<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8" />  
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>  
<title>ℕ𝕒𝕞𝕖𝕕𝕣𝕠𝕡 Ⴆყ ԃԃꪊყᧁ</title>  
<link rel="shortcut icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/dduyg/LiminalLoop@shelf/0-6/favicons/RGB-magentaLavender.ico">  
<link href="https://fonts.cdnfonts.com/css/dellmonte-sans" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Noto+Serif+JP&family=Orbitron&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>  
<style>  
* { margin: 0; padding: 0; box-sizing: border-box; }  
:root {  
  --bg:      #e8e0f6;
  --bg2:     rgba(245,240,255,0.70);
  --bg3:     #f8f5ff;
  --amber:   #ff6ec7;  
  --amber2:  #8a5cff;  
  --rust:    #ff7aa2;  
  --sage:    #4dd6b6;  
  --slate:   #7aa0ff;  
  --text:    #2b2b3a;  
  --muted:   #6b6f8a;   
  --border:  rgba(127,109,255,0.20);
  --border2: rgba(126,156,255,0.12);  
}
[data-theme="darker"] {
  --bg:      #181617;
  --bg2:     rgba(33,29,31,0.72);
  --bg3:     #242021;
  --amber:   #f5b971;
  --amber2:  #d68ab0;
  --rust:    #ff7d8f;
  --sage:    #7cb89d;
  --slate:   #a0b3d9;
  --text:    #f3efeb;
  --muted:   #b1a39c;
  --border:  rgba(214,138,176,0.18);
  --border2: rgba(245,185,113,0.10);
}
body {  
  font-family: "DM Mono", monospace;
  color: var(--text);  
  min-height: 100vh;  
  overflow-x: hidden;  
  background: linear-gradient(135deg, var(--bg) 0%, var(--bg3) 50%, var(--bg) 100%);  
  transition: background 0.3s ease, color 0.3s ease;
}  
body::before {  
  content: '';  
  position: fixed;  
  inset: 0;  
  background: radial-gradient(circle, var(--amber) 1px, transparent 1px), radial-gradient(circle, var(--amber2) 1px, transparent 1px);  
  background-size: 28px 28px, 36px 36px;  
  pointer-events: none;  
  z-index: 0;  
  opacity: 0.08;
}  
.container {  
  position: relative;  
  z-index: 1;  
  max-width: 1300px;  
  margin: 0 auto;  
  padding: 0 28px;  
}  
  
/* ── HEADER ── */  
header {  
  padding: 52px 0 36px;  
  text-align: center;  
  border-bottom: 1px solid var(--border2);  
  margin-bottom: 36px;  
}  
.header-eyebrow {  
  font-family: 'Noto Serif JP', serif;  
  font-size: 11px;  
  letter-spacing: 6px;  
  color: var(--muted);  
  text-transform: uppercase;  
  margin-bottom: 12px;  
  opacity: 0.8;  
}  
.header-title {  
  font-family: 'Dellmonte Sans', sans-serif;  
  font-size: clamp(28px, 5vw, 56px);  
  font-weight: 900;  
  letter-spacing: 8px;  
  color: var(--amber2);  
  line-height: 1;  
  margin-bottom: 8px;  
}  
.header-sub {  
  font-family: 'Noto Serif JP', serif;  
  font-size: 13px;  
  letter-spacing: 4px;  
  color: var(--muted);  
  margin-bottom: 20px;
}  
.header-stats {  
  display: flex;  
  justify-content: center;  
  gap: 32px;  
  margin-bottom: 15px;  
}  
.stat-pill {  
  font-size: 11px;  
  letter-spacing: 2px;  
  color: var(--muted);  
}  
.stat-pill .val {  
  color: var(--amber);  
  font-weight: 700;  
}  
  
/* ── SEARCH ── */  
.search-section { padding-bottom: 30px; }  
.search-wrap {  
  position: relative;  
  max-width: 560px;  
  margin: 0 auto;  
}  
.search-input {  
  width: 100%;  
  background: var(--bg2);  
  border: 1px solid var(--border);  
  border-top: 2px solid var(--amber);  
  padding: 13px 44px 13px 18px;  
  font-family: 'Space Mono', monospace;  
  font-size: 13px;  
  color: var(--text);  
  outline: none;  
  letter-spacing: 1px;  
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;  
}  
.search-input::placeholder { color: var(--muted); }  
.search-input:focus {  
  border-color: var(--amber2);  
  box-shadow: 0 4px 20px rgba(232,197,71,0.07);  
}  
.search-icon {  
  position: absolute;  
  right: 15px; top: 50%;  
  transform: translateY(-50%);  
  color: var(--amber);  
  font-size: 17px;  
  pointer-events: none;  
}  
  
/* ── TOOLBAR ── */  
.toolbar {  
  display: flex;  
  align-items: center;  
  justify-content: space-between;  
  gap: 14px;  
  margin-bottom: 18px;  
  flex-wrap: wrap;  
}  
.toolbar-left {  
  display: flex;  
  align-items: center;  
  gap: 10px;  
  flex-wrap: wrap;  
}  
  
/* ── SORT ── */  
.sort-widget {  
  display: flex;  
  align-items: stretch;  
  border: 1px solid var(--border);  
  border-radius: 2px;  
  overflow: hidden;  
  font-size: 10px;  
  letter-spacing: 1px;  
}  
.sort-label {  
  padding: 7px 10px;  
  background: var(--bg3);  
  border-right: 1px solid var(--border);  
  color: var(--muted);  
  white-space: nowrap;  
  user-select: none;  
  display: flex;  
  align-items: center;  
}  
.sort-option {  
  padding: 0 11px;  
  cursor: pointer;  
  background: transparent;  
  border: none;  
  border-right: 1px solid var(--border);  
  font-family: "DM Mono", monospace;
  font-size: 10px;  
  letter-spacing: 1px;  
  color: var(--muted);  
  transition: all 0.12s;  
  white-space: nowrap;  
  height: 100%;  
  min-height: 32px;  
}  
.sort-option:last-child { border-right: none; }  
.sort-option:hover { background: rgba(232,197,71,0.05); color: var(--text); }  
.sort-option.active { background: rgba(232,197,71,0.1); color: var(--amber); }  
  
/* ── BUTTONS ── */  
.btn {  
  font-family: "DM Mono", monospace;
  font-size: 10px;  
  letter-spacing: 2px;  
  padding: 8px 16px;  
  border: 1px solid;  
  cursor: pointer;  
  transition: all 0.15s;  
  text-transform: uppercase;  
  background: transparent;  
  border-radius: 2px;  
  white-space: nowrap;  
}  
.btn-amber { border-color: var(--amber); color: var(--amber); }  
.btn-amber:hover { background: var(--amber); color: var(--bg); }  
.btn-rust  { border-color: var(--rust);  color: var(--rust);  }  
.btn-rust:hover  { background: var(--rust);  color: var(--bg); }  
/* hidden admin controls */  
.admin-hidden { display: none; }  
  
.view-toggle {  
  display: flex;  
  border: 1px solid var(--border);  
  border-radius: 2px;  
  overflow: hidden;  
}  
.view-btn {  
  background: transparent;  
  border: none;  
  border-right: 1px solid var(--border);  
  color: var(--muted);  
  padding: 8px 13px;  
  cursor: pointer;  
  font-size: 13px;  
  transition: all 0.12s;  
}  
.view-btn:last-child { border-right: none; }  
.view-btn.active { background: rgba(232,197,71,0.1); color: var(--amber); }  
  
/* ── FILTER PANEL ── */  
.filter-panel {  
  background: var(--bg2);  
  border: 1px solid var(--border);  
  border-left: 3px solid var(--amber2);  
  padding: 22px 24px;  
  margin-bottom: 20px;  
  display: none;  
}  
.filter-panel.open { display: block; }  
.filter-grid {  
  display: grid;  
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));  
  gap: 20px;  
  margin-bottom: 16px;  
}  
.filter-group label {  
  display: block;  
  font-size: 9px;  
  letter-spacing: 3px;  
  color: var(--amber2);  
  text-transform: uppercase;  
  margin-bottom: 10px;  
}  
.filter-chips { display: flex; flex-wrap: wrap; gap: 5px; }  
.chip {  
  font-family: "DM Mono", monospace;
  font-size: 10px;  
  letter-spacing: 1px;  
  padding: 4px 10px;  
  border: 1px solid rgba(90,100,114,0.35);  
  cursor: pointer;  
  color: var(--muted);  
  background: transparent;  
  transition: all 0.12s;  
  white-space: nowrap;  
  border-radius: 1px;  
}  
.chip:hover { border-color: var(--amber2); color: var(--text); }  
.chip.active { background: rgba(232,197,71,0.1); border-color: var(--amber); color: var(--amber); }  
.filter-divider { height: 1px; background: var(--border2); margin: 14px 0; }  
.filter-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }  
.active-filters { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }  
.active-filter-tag {  
  font-size: 9px;  
  padding: 3px 9px;  
  background: rgba(196,91,58,0.1);  
  border: 1px solid rgba(196,91,58,0.3);  
  color: var(--rust);  
  display: flex;  
  align-items: center;  
  gap: 6px;  
  cursor: pointer;  
  letter-spacing: 1px;  
  border-radius: 1px;  
}  
.active-filter-tag:hover { background: rgba(196,91,58,0.2); }  
  
/* ── GRID CARD ── */  
.names-grid {  
  display: grid;  
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));  
  gap: 12px;  
  margin-bottom: 48px;  
}  
.names-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 48px; }  
  
/* ── GRID CARD ── */  
.name-card {  
  background: var(--bg2);  
  border: 1px solid var(--border2);  
  padding: 20px;  
  cursor: pointer;  
  transition: all 0.16s, background 0.16s;  
  display: flex;  
  flex-direction: column;  
  gap: 11px;  
  position: relative;  
  overflow: hidden;  
  user-select: none;  
}  
.name-card::after {  
  content: '';  
  position: absolute;  
  bottom: 0; left: 0; right: 0; height: 2px;  
  background: linear-gradient(90deg, var(--amber2), var(--amber));  
  transform: scaleX(0);  
  transform-origin: left;  
  transition: transform 0.2s;  
}  
.name-card:hover { border-color: rgba(232,197,71,0.28); background: var(--bg3); }  
.name-card:hover::after { transform: scaleX(1); }  
.name-card.flash { background: rgba(232,197,71,0.07); border-color: var(--amber); }  
.card-title {  
  font-family: 'Orbitron', sans-serif;  
  font-size: 14px;  
  font-weight: 700;  
  letter-spacing: 1.5px;  
  color: var(--text);  
  line-height: 1.3;  
}  
.card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }  
.badge {  
  font-size: 8px;  
  letter-spacing: 2px;  
  padding: 3px 7px;  
  border-radius: 1px;  
  text-transform: uppercase;  
  font-weight: 700;  
}  
.badge-category { background: rgba(232,197,71,0.1); color: var(--amber2); border: 1px solid rgba(232,197,71,0.2); }  
.badge-mood     { background: rgba(122,171,138,0.1); color: var(--sage);   border: 1px solid rgba(122,171,138,0.2); }  
.badge-style    { background: rgba(143,163,184,0.1); color: var(--slate);  border: 1px solid rgba(143,163,184,0.2); }  
.badge-length   { background: rgba(196,91,58,0.08);  color: var(--rust);   border: 1px solid rgba(196,91,58,0.2); }  
.card-tags-inline { font-size: 10px; color: var(--muted); letter-spacing: 1px; line-height: 1.6; }  
.card-footer {  
  display: flex;  
  justify-content: space-between;  
  align-items: center;  
  font-size: 9px;  
  color: var(--muted);  
  border-top: 1px solid var(--border2);  
  padding-top: 10px;  
  letter-spacing: 2px;  
}  
  
/* ── LIST ROW ── */  
.list-row {  
  display: flex;  
  align-items: center;  
  gap: 20px;  
  padding: 11px 16px;  
  background: var(--bg2);  
  border: 1px solid var(--border2);  
  cursor: pointer;  
  transition: all 0.12s;  
  user-select: none;  
}  
.list-row:hover { background: var(--bg3); border-color: rgba(232,197,71,0.22); }  
.list-row.flash { background: rgba(232,197,71,0.06); border-color: var(--amber); }  
.list-title {  
  font-family: 'Orbitron', sans-serif;  
  font-size: 13px;  
  font-weight: 700;  
  letter-spacing: 1.5px;  
  color: var(--text);  
  flex: 1; min-width: 0;  
}  
.list-id {  
  font-size: 9px;  
  letter-spacing: 2px;  
  color: rgba(107,111,138,0.5);  
  flex-shrink: 0;  
  font-family: 'Space Mono', monospace;  
}  
  
/* ── EMPTY / LOADING ── */  
.empty-state {  
  text-align: center; padding: 80px 20px;  
  color: var(--muted); grid-column: 1 / -1;  
}  
.empty-state .e-icon { font-size: 36px; opacity: 0.2; margin-bottom: 14px; }  
.empty-state p { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }  
.loading-state {  
  text-align: center; padding: 80px 20px;  
  color: var(--muted); font-size: 10px;  
  letter-spacing: 4px; text-transform: uppercase;  
}  
.loading-state .spinner {  
  font-size: 24px; display: block; margin-bottom: 14px;  
  animation: spin 1.2s linear infinite; opacity: 0.3;  
}  
@keyframes spin { to { transform: rotate(360deg); } }  
  
/* ── CONTEXT MENU ── */  
.ctx-menu {  
  position: fixed;  
  background: var(--bg3);  
  border: 1px solid var(--border);  
  border-top: 2px solid var(--amber2);  
  min-width: 160px;  
  z-index: 200;  
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);  
  display: none;  
}  
.ctx-menu.open { display: block; }  
.ctx-item {  
  font-family: "DM Mono", monospace;
  font-size: 10px;  
  letter-spacing: 2px;  
  padding: 10px 16px;  
  cursor: pointer;  
  color: var(--muted);  
  transition: all 0.1s;  
  text-transform: uppercase;  
  border-bottom: 1px solid var(--border2);  
}  
.ctx-item:last-child { border-bottom: none; }  
.ctx-item:hover { background: rgba(232,197,71,0.06); color: var(--text); }  
.ctx-item.danger:hover { background: rgba(255,122,162,0.08); color: var(--rust); }  
  
/* ── MODAL ── */  
.modal-overlay {  
  position: fixed; inset: 0;  
  background: rgba(0,0,0,0.6);  
  backdrop-filter: blur(8px);  
  z-index: 100;  
  display: flex; align-items: center; justify-content: center;  
  padding: 20px;  
  opacity: 0; pointer-events: none;  
  transition: opacity 0.22s;  
}  
.modal-overlay.open { opacity: 1; pointer-events: all; }  
.modal {  
  background: var(--bg3);
  border: 1px solid rgba(138,92,255,0.28);  
  border-top: 3px solid var(--amber);  
  padding: 30px;  
  width: 100%; max-width: 510px;  
  max-height: 88vh; overflow-y: auto;  
  box-shadow: 0 24px 80px rgba(138,92,255,0.18), 0 0 0 1px rgba(255,110,199,0.08) inset;  
  transform: translateY(14px);  
  transition: transform 0.22s;  
  position: relative;  
}  
.modal::before {  
  content: '';  
  position: absolute; inset: 0;  
  background: radial-gradient(circle, rgba(255,110,199,0.07) 1px, transparent 1px), radial-gradient(circle, rgba(138,92,255,0.05) 1px, transparent 1px);  
  background-size: 22px 22px, 30px 30px;  
  pointer-events: none;  
  border-radius: inherit;  
}  
.modal-overlay.open .modal { transform: translateY(0); }  
.modal-header {  
  display: flex; justify-content: space-between; align-items: center;  
  margin-bottom: 26px; padding-bottom: 14px;  
  border-bottom: 1px solid rgba(138,92,255,0.15);  
  position: relative;  
}  
.modal-title { font-family: 'Orbitron', sans-serif; font-size: 13px; letter-spacing: 4px; color: var(--amber); }  
.modal-close {  
  background: none; border: 1px solid var(--border);  
  color: var(--muted); font-size: 13px;  
  cursor: pointer; padding: 4px 9px; transition: all 0.12s;  
}  
.modal-close:hover { border-color: var(--rust); color: var(--rust); }  
.form-group { margin-bottom: 18px; position: relative; }  
.form-label {  
  display: block; font-size: 9px; letter-spacing: 3px;  
  color: var(--amber2); text-transform: uppercase; margin-bottom: 7px;  
}  
.form-input {  
  width: 100%;  
  background: var(--bg2);  
  border: 1px solid var(--border);  
  border-bottom: 2px solid var(--amber);  
  padding: 10px 13px;  
  font-family:"DM Mono", monospace;
  font-size: 12px; color: var(--text); outline: none;  
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;  
  letter-spacing: 0.5px; border-radius: 1px;  
}  
.form-input:focus {  
  border-color: var(--border2);  
  border-bottom-color: var(--amber2);
}  
.form-input[readonly] { opacity: 0.45; cursor: default; background: rgba(246,241,255,0.5); }  
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.modal-footer {  
  display: flex; gap: 10px; justify-content: flex-end;  
  margin-top: 22px; padding-top: 18px;  
  border-top: 1px solid rgba(138,92,255,0.12);  
  position: relative;  
}  
  
/* ── CONFIRM MODAL ── */  
.confirm-overlay {  
  position: fixed; inset: 0;  
  background: rgba(0,0,0,0.6);  
  backdrop-filter: blur(4px);  
  z-index: 150;  
  display: flex; align-items: center; justify-content: center;  
  padding: 20px; opacity: 0; pointer-events: none;  
  transition: opacity 0.18s;  
}  
.confirm-overlay.open { opacity: 1; pointer-events: all; }  
.confirm-box {  
  background: var(--bg3);  
  border: 1px solid var(--border);  
  border-top: 3px solid var(--rust);  
  padding: 28px; max-width: 360px; width: 100%;  
  text-align: center;  
  transform: translateY(10px); transition: transform 0.18s;  
  box-shadow: 0 16px 48px rgba(255,122,162,0.15);  
}  
.confirm-overlay.open .confirm-box { transform: translateY(0); }  
.confirm-title { font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 3px; color: var(--rust); margin-bottom: 12px; }  
.confirm-msg { font-size: 10px; color: var(--muted); letter-spacing: 1px; line-height: 1.8; margin-bottom: 22px; }  
.confirm-name { color: var(--text); font-weight: 700; }  
.confirm-actions { display: flex; gap: 10px; justify-content: center; }  
  
/* ── PASSWORD MODAL ── */  
.pw-overlay {  
  position: fixed; inset: 0;  
  background: rgba(0,0,0,0.6);  
  backdrop-filter: blur(12px);  
  z-index: 250;  
  display: flex; align-items: center; justify-content: center;  
  padding: 20px; opacity: 0; pointer-events: none;  
  transition: opacity 0.22s;  
}  
.pw-overlay.open { opacity: 1; pointer-events: all; }  
.pw-box {  
  background: var(--bg3);  
  border: 1px solid var(--border);
  border-top: 3px solid var(--amber2);  
  padding: 32px;  
  width: 100%; max-width: 360px;  
  text-align: center;  
  transform: translateY(12px); transition: transform 0.22s;  
  box-shadow: 0 24px 80px rgba(138,92,255,0.22);  
  position: relative;  
}  
.pw-box::before {  
  content: '';  
  position: absolute; inset: 0;  
  background: radial-gradient(circle, rgba(138,92,255,0.05) 1px, transparent 1px);  
  background-size: 20px 20px;  
  pointer-events: none;  
}  
.pw-overlay.open .pw-box { transform: translateY(0); }  
.pw-icon { font-size: 28px; margin-bottom: 14px; opacity: 0.5; }  
.pw-title {  
  font-family: 'Orbitron', sans-serif;  
  font-size: 11px; letter-spacing: 4px;  
  color: var(--amber2); margin-bottom: 6px;  
}  
.pw-sub {  
  font-size: 9px; letter-spacing: 2px;  
  color: var(--muted); margin-bottom: 22px;  
}  
.pw-input {  
  width: 100%;  
  background: var(--bg2);  
  border: 1px solid var(--border);  
  border-bottom: 2px solid var(--amber2);  
  padding: 11px 14px;  
  font-family: "DM Mono", monospace;
  font-size: 14px; letter-spacing: 4px;  
  color: var(--text); outline: none;  
  text-align: center; border-radius: 1px;  
  transition: border-color 0.15s, box-shadow 0.15s;  
  margin-bottom: 14px;  
}  
.pw-input:focus {  
  border-bottom-color: var(--amber);  
}  
.pw-input.shake {  
  animation: shake 0.35s ease;  
  border-bottom-color: var(--rust);  
}  
@keyframes shake {  
  0%,100% { transform: translateX(0); }  
  20%      { transform: translateX(-6px); }  
  40%      { transform: translateX(6px); }  
  60%      { transform: translateX(-4px); }  
  80%      { transform: translateX(4px); }  
}  
.pw-error {  
  font-size: 9px; letter-spacing: 2px;  
  color: var(--rust); margin-bottom: 14px;  
  min-height: 14px;  
}  
.pw-actions { display: flex; gap: 10px; justify-content: center; }  
  
/* ── TOAST ── */  
.toast {  
  position: fixed; bottom: 35px; left: 50%;  
  transform: translateX(-50%) translateY(60px);  
  background: var(--amber2);  
  padding: 10px 22px;  
  font-size: 14px; color: var(--bg3);  
  z-index: 300; opacity: 0; transition: all 0.22s; white-space: nowrap;  
}  
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }  
  
/* ── SCROLLBAR ── */  
::-webkit-scrollbar { width: 5px; }  
::-webkit-scrollbar-track { background: var(--bg); }  
::-webkit-scrollbar-thumb { background: rgba(232,197,71,0.18); }  
::-webkit-scrollbar-thumb:hover { background: rgba(232,197,71,0.38); }  
  
@media (max-width: 620px) {  
  .form-row { grid-template-columns: 1fr; }  
  .names-grid { grid-template-columns: 1fr; }  
  .sort-option { padding: 0 7px; font-size: 9px; }  
}  
</style>  
</head>  
<body>  
<div class="container">  
  <header>  
    <div class="header-eyebrow">ネーミングデータベースアーカイブ · v2.0</div>  
    <h1 class="header-title">ＮＡＭＥＤＲＯＰ</h1>  
    <div class="header-sub">名前のアーカイブ — Name Archive System&nbsp;&nbsp;
      <span id="admin-lock-btn" style="letter-spacing:normal;font-size:7px;color:var(--muted);cursor:pointer;user-select:none;"><sub>⚿ Admin access</sub></span>
      <span id="theme-toggle-btn" style="font-size:8px;color:var(--muted);cursor:pointer;user-select:none;margin-left:2px;">◑</span>   
    </div>  
    <div class="header-stats">  
      <div class="stat-pill">ENTRIES <span class="val" id="stat-total">—</span></div>  
      <div class="stat-pill">FILTERED <span class="val" id="stat-filtered">—</span></div>  
      <div class="stat-pill">TAGS <span class="val" id="stat-tags">—</span></div>  
    </div>  
  </header>  
  
  <div class="search-section">  
    <div class="search-wrap">  
      <input type="text" class="search-input" id="search-input" placeholder="Search...">  
      <span class="search-icon">⌕</span>  
    </div>  
  </div>  
  
  <div class="toolbar">  
    <div class="toolbar-left">  
      <button class="btn btn-amber" id="filter-toggle">⚱ FILTERS</button>  
      <div class="sort-widget">  
        <span class="sort-label">SORT</span>  
        <button class="sort-option active" data-sort="default">DEFAULT</button>  
        <button class="sort-option" data-sort="alpha-asc">A→Z</button>  
        <button class="sort-option" data-sort="alpha-desc">Z→A</button>  
        <button class="sort-option" data-sort="len-asc">LEN↑</button>  
        <button class="sort-option" data-sort="len-desc">LEN↓</button>  
        <button class="sort-option" data-sort="newest">NEW</button>

    </div>  
    <div style="display:flex;gap:8px;align-items:center;">  
      <div class="view-toggle">

        <button class="view-btn" id="view-list" title="List">☰</button>  
      </div>  
      <button class="btn btn-amber admin-hidden" id="add-btn">+ NEW ENTRY</button>  
    </div>  
  </div>  
  
  <div class="filter-panel" id="filter-panel">  
    <div class="filter-grid">  
      <div class="filter-group"><label>Category</label><div class="filter-chips" id="fc-category"></div></div>  
      <div class="filter-group"><label>Mood</label><div class="filter-chips" id="fc-mood"></div></div>  
      <div class="filter-group"><label>Style</label><div class="filter-chips" id="fc-style"></div></div>  
      <div class="filter-group"><label>Length</label><div class="filter-chips" id="fc-length"></div></div>  
    </div>  
    <div class="filter-divider"></div>  
    <div class="filter-group"><label>Tags</label><div class="filter-chips" id="fc-tags"></div></div>  
    <div class="filter-divider"></div>  
    <div class="filter-actions">  
      <div class="active-filters" id="active-filters"></div>  
      <button class="btn btn-rust" id="clear-filters">✕ CLEAR</button>  
    </div>  
  </div>  
  
  <div id="names-container"><div class="loading-state"><span class="spinner">◈</span>LOADING DATABASE...</div></div>  
</div>  
  
<div class="modal-overlay" id="modal-overlay">  
  <div class="modal">  
    <div class="modal-header">  
      <span class="modal-title" id="modal-title">NEW ENTRY</span>

    <div class="form-group">  
      <label class="form-label">Title *</label>  
      <input type="text" class="form-input" id="f-title" placeholder="Synthetic Entrance">

    <div class="form-row">

        <label class="form-label">Category *</label>  
        <input type="text" class="form-input" id="f-category" placeholder="Technical">

    </div>  
    <div class="form-group">  
      <label class="form-label">Tags <span style="color:var(--muted);font-weight:400">(comma-separated)</span></label>  
      <input type="text" class="form-input" id="f-tags" placeholder="cyber, retro, nostalgia">  
    </div>  
    <div class="modal-footer">  
      <button class="btn btn-rust" id="modal-cancel">CANCEL</button>  
      <button class="btn btn-amber" id="modal-save">SAVE</button>

  </div>  
</div>  
  
<div class="confirm-overlay" id="confirm-overlay">  
  <div class="confirm-box">  
    <div class="confirm-title">DELETE ENTRY</div>  
    <div class="confirm-msg">Remove <span class="confirm-name" id="confirm-name">—</span> from the archive?<br>This cannot be undone.</div>  
    <div class="confirm-actions">  
      <button class="btn btn-rust" id="confirm-yes">DELETE</button>  
      <button class="btn btn-amber" id="confirm-no">CANCEL</button>  
    </div>  
  </div>  
</div>  
  
<div class="ctx-menu" id="ctx-menu">  
  <div class="ctx-item admin-hidden" id="ctx-edit">✎ EDIT</div>  
  <div class="ctx-item danger admin-hidden" id="ctx-delete">✕ DELETE</div>  
</div>  
  
<div class="pw-overlay" id="pw-overlay">  
  <div class="pw-box">  
    <div class="pw-icon">⚿</div>  
    <div class="pw-title">ADMIN ACCESS</div>  
    <div class="pw-sub">管理者認証 · Enter passphrase</div>  
    <input type="password" class="pw-input" id="pw-input" placeholder="◦◦◦◦◦◦◦◦◦◦◦" autocomplete="current-password">  
    <div class="pw-error" id="pw-error"></div>  
    <div class="pw-actions">  
      <button class="btn btn-rust" id="pw-cancel">CANCEL</button>  
      <button class="btn btn-amber" id="pw-confirm">UNLOCK</button>  
    </div>  
  </div>  
</div>  
  
<div class="toast" id="toast"></div>  
  
<script>  
/* ═══════════════════════════════════════  
   THEME MANAGER  
═══════════════════════════════════════ */  
const themeBtn = document.getElementById('theme-toggle-btn');

function initTheme() {
  const savedTheme = localStorage.getItem('namedrop-theme') || 'default';
  if (savedTheme === 'darker') {
    document.documentElement.setAttribute('data-theme', 'darker');
    themeBtn.textContent = '◐';
  } else {
    document.documentElement.removeAttribute('data-theme');
    themeBtn.textContent = '◑';
  }
}

themeBtn.onclick = () => {
  const currentTheme = document.documentElement.getAttribute('data-theme');
  if (currentTheme === 'darker') {
    document.documentElement.removeAttribute('data-theme');
    themeBtn.textContent = '◑';
    localStorage.setItem('namedrop-theme', 'default');
    showToast('LIGHT MODE');
  } else {
    document.documentElement.setAttribute('data-theme', 'darker');
    themeBtn.textContent = '◐';
    localStorage.setItem('namedrop-theme', 'darker');
    showToast('DARK MODE');
  }
};

initTheme();
/* ═══════════════════════════════════════  
   SUPABASE  
═══════════════════════════════════════ */  
const SUPABASE_URL = "https://zsiilkcothfqtdmazbds.supabase.co";  
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzaWlsa2NvdGhmcXRkbWF6YmRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNTk1ODEsImV4cCI6MjA5NDkzNTU4MX0.WeoxJ_bWEa_UVqttCQynruUkefS3RXa8ZSzB3gZWJ6c";  
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);  
const ADMIN_HASH = '23ea2a1ec8cfb8ff6db14a915a7d78553c3236c42951a216666f3bc8b9935c05';  
  
let isAdmin = false;  
  
async function hashPassword(pw) {  
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));  
  return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2,'0')).join('');  
}  
  
async function tryUnlock(pw) {  
  const h = await hashPassword(pw);  
  return h === ADMIN_HASH;  
}  
  
function setAdminState(val) {  
  isAdmin = val;  
  const btn = document.getElementById('admin-lock-btn');  
  if (isAdmin) {  
    btn.innerHTML = '<sub>⚿ Lock admin session</sub>';  
    document.querySelectorAll('.admin-hidden').forEach(el => {  
      el.style.display = 'block';  
    });  
  } else {  
    btn.innerHTML = '<sub>⚿ Admin access</sub>';  
    document.querySelectorAll('.admin-hidden').forEach(el => {  
      el.style.display = 'none';  
    });  
  }  
}  
  
/* Password modal */  
function openPwModal() {  
  document.getElementById('pw-input').value = '';  
  document.getElementById('pw-error').textContent = '';  
  document.getElementById('pw-overlay').classList.add('open');  
  setTimeout(() => document.getElementById('pw-input').focus(), 240);  
}  
function closePwModal() {  
  document.getElementById('pw-overlay').classList.remove('open');  
}  
  
document.getElementById('pw-cancel').onclick = closePwModal;  
document.getElementById('pw-confirm').onclick = async () => {  
  const pw  = document.getElementById('pw-input').value;  
  const ok  = await tryUnlock(pw);  
  if (ok) {  
    closePwModal();  
    setAdminState(true);  
    showToast('ADMIN UNLOCKED');  
  } else {  
    const inp = document.getElementById('pw-input');  
    inp.classList.add('shake');  
    document.getElementById('pw-error').textContent = 'INCORRECT PASSPHRASE';  
    setTimeout(() => inp.classList.remove('shake'), 400);  
  }  
};  
document.getElementById('pw-input').addEventListener('keydown', e => {  
  if (e.key === 'Enter') document.getElementById('pw-confirm').click();  
});  
  
document.getElementById('admin-lock-btn').onclick = () => {  
  if (isAdmin) {  
    setAdminState(false);  
    showToast('SESSION LOCKED');  
  } else {  
    openPwModal();  
  }  
};  
  
/* ═══════════════════════════════════════  
   STATE  
═══════════════════════════════════════ */  
let entries      = [];  
let currentView  = 'grid';  
let currentSort  = 'default';  
let editingId    = null;  
let ctxTargetId  = null;  
let pendingDeleteId = null;  
  
let activeFilters = {  
  category: [], mood: [], style: [], length: [], tags: []  
};  
  
/* ═══════════════════════════════════════  
   HELPERS  
═══════════════════════════════════════ */  
function wordLen(title) {  
  const w = title.trim().split(/\s+/).length;  
  if (w <= 2) return 'Short (1–2)';  
  if (w === 3) return 'Medium (3)';  
  return 'Long (4+)';  
}  
function getAllTags() {  
  const s = new Set();  
  entries.forEach(e => (e.tags || []).forEach(t => s.add(t)));  
  return [...s].sort();  
}  
function uniqueVals(key) {  
  return [...new Set(entries.map(e => e[key]).filter(Boolean))].sort();  
}  
function safe(str) {  
  if (!str) return '';  
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');  
}  
function showToast(msg) {  
  const t = document.getElementById('toast');  
  t.textContent = msg;  
  t.classList.add('show');  
  clearTimeout(t._t);  
  t._t = setTimeout(() => t.classList.remove('show'), 2200);  
}  
function flashCard(id) {  
  const el = document.querySelector(`[data-id="${id}"]`);  
  if (!el) return;  
  el.classList.add('flash');  
  setTimeout(() => el.classList.remove('flash'), 550);  
}  
function closeCtx() {  
  document.getElementById('ctx-menu').classList.remove('open');  
  ctxTargetId = null;  
}  
  
/* ═══════════════════════════════════════  
   SUPABASE OPS  
═══════════════════════════════════════ */  
async function loadEntries() {  
  const { data, error } = await db  
    .from('namedrop_entries')  
    .select('*')  
    .order('id', { ascending: true });  
  
  if (error) {  
    console.error(error);  
    showToast('DATABASE ERROR');  
    document.getElementById('names-container').innerHTML =  
      `<div class="empty-state"><div class="e-icon">⚠</div><p>Could not load archive</p></div>`;  
    return;  
  }  
  entries = data || [];  
  buildChips();  
  render();  
}  
  
async function saveEntry() {  
  if (!isAdmin) { showToast('ADMIN ACCESS REQUIRED'); return; }  
  const title    = document.getElementById('f-title').value.trim();  
  const category = document.getElementById('f-category').value.trim();  
  const mood     = document.getElementById('f-mood').value.trim();  
  const style    = document.getElementById('f-style').value.trim();  
  const tags     = document.getElementById('f-tags').value  
    .split(',').map(t => t.trim().toLowerCase()).filter(Boolean);  
  
  if (!title)    { showToast('TITLE REQUIRED');    return; }  
  if (!category) { showToast('CATEGORY REQUIRED'); return; }  
  if (!mood)     { showToast('MOOD REQUIRED');     return; }  
  
  if (editingId !== null) {  
    const { error } = await db  
      .from('namedrop_entries')  
      .update({ title, category, mood, style, tags })  
      .eq('id', Number(editingId));  
    if (error) { console.error(error); showToast('UPDATE FAILED'); return; }  
    showToast('UPDATED: ' + title);  
  } else {  
    const { error } = await db  
      .from('namedrop_entries')  
      .insert([{ title, category, mood, style, tags, added: Date.now() }]);  
    if (error) { console.error(error); showToast('SAVE FAILED'); return; }  
    showToast('ADDED: ' + title);  
  }  
  closeModal();  
  await loadEntries();  
}  
  
async function deleteEntry(id) {  
  if (!isAdmin) { showToast('ADMIN ACCESS REQUIRED'); return; }  
  const { error } = await db  
    .from('namedrop_entries')  
    .delete()  
    .eq('id', Number(id));  
  if (error) { console.error(error); showToast('DELETE FAILED'); return; }  
  showToast('ENTRY DELETED');  
  await loadEntries();  
}  
  
/* ═══════════════════════════════════════  
   FILTER / SORT / RENDER  
═══════════════════════════════════════ */  
function buildChips() {  
  buildGroup('fc-category', uniqueVals('category'), 'category');  
  buildGroup('fc-mood',     uniqueVals('mood'),     'mood');  
  buildGroup('fc-style',    uniqueVals('style'),    'style');  
  buildGroup('fc-length',   ['Short (1–2)', 'Medium (3)', 'Long (4+)'], 'length');  
  const tw = document.getElementById('fc-tags');  
  tw.innerHTML = '';  
  getAllTags().forEach(t => {  
    tw.appendChild(chip('#' + t, activeFilters.tags.includes(t), () => toggleFilter('tags', t)));  
  });  
  renderActiveFilters();  
}  
function buildGroup(elId, vals, type) {  
  const w = document.getElementById(elId);  
  w.innerHTML = '';  
  vals.forEach(v => {  
    w.appendChild(chip(v, activeFilters[type].includes(v), () => toggleFilter(type, v)));  
  });  
}  
function chip(label, isActive, onClick) {  
  const b = document.createElement('button');  
  b.className = 'chip' + (isActive ? ' active' : '');  
  b.textContent = label;  
  b.onclick = onClick;  
  return b;  
}  
function toggleFilter(type, val) {  
  const arr = activeFilters[type];  
  const i = arr.indexOf(val);  
  if (i >= 0) arr.splice(i, 1); else arr.push(val);  
  buildChips(); render();  
}  
function renderActiveFilters() {  
  const w = document.getElementById('active-filters');  
  w.innerHTML = '';  
  Object.entries(activeFilters).forEach(([type, vals]) => {  
    vals.forEach(v => {  
      const d = document.createElement('div');  
      d.className = 'active-filter-tag';  
      d.innerHTML = `${type}: ${v} <span>✕</span>`;  
      d.onclick = () => toggleFilter(type, v);  
      w.appendChild(d);  
    });  
  });  
}  
function getFiltered() {  
  const q = document.getElementById('search-input').value.toLowerCase().trim();  
  let items = entries.filter(e => {  
    if (q) {  
      const hay = [e.title, e.category, e.mood, e.style, ...(e.tags || [])].join(' ').toLowerCase();  
      if (!hay.includes(q)) return false;  
    }  
    if (activeFilters.category.length && !activeFilters.category.includes(e.category)) return false;  
    if (activeFilters.mood.length     && !activeFilters.mood.includes(e.mood))         return false;  
    if (activeFilters.style.length    && !activeFilters.style.includes(e.style))       return false;  
    if (activeFilters.length.length   && !activeFilters.length.includes(wordLen(e.title))) return false;  
    if (activeFilters.tags.length     && !activeFilters.tags.some(t => (e.tags || []).includes(t))) return false;  
    return true;  
  });  
  if (currentSort === 'alpha-asc')  items.sort((a,b) => a.title.localeCompare(b.title));  
  if (currentSort === 'alpha-desc') items.sort((a,b) => b.title.localeCompare(a.title));  
  if (currentSort === 'len-asc')    items.sort((a,b) => a.title.length - b.title.length);  
  if (currentSort === 'len-desc')   items.sort((a,b) => b.title.length - a.title.length);  
  if (currentSort === 'newest')     items.sort((a,b) => b.added - a.added);  
  return items;  
}  
function render() {  
  const items = getFiltered();  
  document.getElementById('stat-total').textContent    = entries.length;  
  document.getElementById('stat-filtered').textContent = items.length;  
  document.getElementById('stat-tags').textContent     = getAllTags().length;  
  const c = document.getElementById('names-container');  
  if (currentView === 'grid') {  
    c.className = 'names-grid';  
    c.innerHTML = items.length ? items.map(gridCard).join('') : emptyHTML();  
  } else {  
    c.className = 'names-list';  
    c.innerHTML = items.length ? items.map(listRow).join('') : emptyHTML();  
  }  
}  
function emptyHTML() {  
  return `<div class="empty-state"><div class="e-icon">◈</div><p>No entries match</p></div>`;  
}  
function gridCard(e) {  
  const tags = (e.tags || []).map(t => `#${t}`).join(', ');  
  return `  
    <div class="name-card" data-id="${e.id}"  
      onclick="copyEntry(${e.id})"  
      oncontextmenu="openCtx(event, ${e.id})">  
      <div class="card-title">${safe(e.title)}</div>  
      <div class="card-meta">  
        ${e.category ? `<span class="badge badge-category">${safe(e.category)}</span>` : ''}  
        ${e.mood     ? `<span class="badge badge-mood">${safe(e.mood)}</span>`         : ''}  
        ${e.style    ? `<span class="badge badge-style">${safe(e.style)}</span>`       : ''}  
      </div>  
      ${tags ? `<div class="card-tags-inline">${safe(tags)}</div>` : ''}  
      <div class="card-footer">  
        <span>ID·${String(e.id).padStart(4,'0')}</span>  
        <span class="badge badge-length">${wordLen(e.title)}</span>  
      </div>  
    </div>`;  
}  
function listRow(e) {  
  return `  
    <div class="list-row" data-id="${e.id}"  
      onclick="copyEntry(${e.id})"  
      oncontextmenu="openCtx(event, ${e.id})">  
      <span class="list-title">${safe(e.title)}</span>  
      <span class="list-id">ID·${String(e.id).padStart(4,'0')}</span>  
    </div>`;  
}  
  
/* ═══════════════════════════════════════  
   COPY  
═══════════════════════════════════════ */  
function copyEntry(id) {  
  const e = entries.find(x => x.id === Number(id));  
  if (!e) return;  
  navigator.clipboard.writeText(e.title).catch(() => {});  
  flashCard(id);  
  showToast('COPIED: ' + e.title);  
}  
  
/* ═══════════════════════════════════════  
   CONTEXT MENU  
═══════════════════════════════════════ */  
function openCtx(event, id) {  
  event.preventDefault();  
  event.stopPropagation();  
  ctxTargetId = Number(id);  
  
  document.getElementById('ctx-edit').style.display   = isAdmin ? 'block' : 'none';  
  document.getElementById('ctx-delete').style.display = isAdmin ? 'block' : 'none';  
  
  const m = document.getElementById('ctx-menu');  
  m.style.left = Math.min(event.clientX, window.innerWidth  - 180) + 'px';  
  m.style.top  = Math.min(event.clientY, window.innerHeight - 90)  + 'px';  
  
  if (isAdmin) {  
    m.classList.add('open');  
  } else {  
    m.classList.remove('open');  
  }  
}  
  
document.getElementById('ctx-edit').onclick = () => {  
  if (ctxTargetId === null || !isAdmin) return;  
  openEditModal(ctxTargetId);  
  closeCtx();  
};  
document.getElementById('ctx-delete').onclick = () => {  
  if (ctxTargetId === null || !isAdmin) return;  
  openConfirm(ctxTargetId);  
  closeCtx();  
};  
document.addEventListener('click', e => {  
  if (!document.getElementById('ctx-menu').contains(e.target)) closeCtx();  
});  
  
/* ═══════════════════════════════════════  
   ADD / EDIT MODAL  
═══════════════════════════════════════ */  
function openModal() {  
  if (!isAdmin) { showToast('ADMIN ACCESS REQUIRED'); return; }  
  editingId = null;  
  document.getElementById('modal-title').textContent = 'NEW ENTRY';  
  document.getElementById('modal-overlay').classList.add('open');  
  setTimeout(() => document.getElementById('f-title').focus(), 100);  
}  
function openEditModal(id) {  
  if (!isAdmin) return;  
  const e = entries.find(x => x.id === Number(id));  
  if (!e) return;  
  editingId = Number(id);  
  document.getElementById('modal-title').textContent = 'EDIT ENTRY';  
  document.getElementById('f-title').value    = e.title    || '';  
  document.getElementById('f-category').value = e.category || '';  
  document.getElementById('f-mood').value     = e.mood     || '';  
  document.getElementById('f-style').value    = e.style    || '';  
  document.getElementById('f-tags').value     = (e.tags || []).join(', ');  
  document.getElementById('f-length').value   = wordLen(e.title);  
  document.getElementById('modal-overlay').classList.add('open');  
  setTimeout(() => document.getElementById('f-title').focus(), 100);  
}  
function closeModal() {  
  document.getElementById('modal-overlay').classList.remove('open');  
  editingId = null;  
  ['f-title','f-category','f-mood','f-style','f-tags','f-length'].forEach(id => {  
    document.getElementById(id).value = '';  
  });  
  document.getElementById('modal-title').textContent = 'NEW ENTRY';  
}  
function updateLenPreview() {  
  const v = document.getElementById('f-title').value;  
  document.getElementById('f-length').value = v.trim() ? wordLen(v) : '';  
}  
  
/* ═══════════════════════════════════════  
   DELETE CONFIRM  
═══════════════════════════════════════ */  
function openConfirm(id) {  
  if (!isAdmin) return;  
  const e = entries.find(x => x.id === Number(id));  
  if (!e) return;  
  pendingDeleteId = Number(id);  
  document.getElementById('confirm-name').textContent = e.title;  
  document.getElementById('confirm-overlay').classList.add('open');  
}  
function closeConfirm() {  
  document.getElementById('confirm-overlay').classList.remove('open');  
  pendingDeleteId = null;  
}  
document.getElementById('confirm-yes').onclick = async () => {  
  if (pendingDeleteId === null) return;  
  const id = pendingDeleteId;  
  closeConfirm();  
  await deleteEntry(id);  
};  
document.getElementById('confirm-no').onclick = closeConfirm;  
  
/* ═══════════════════════════════════════  
   EVENT WIRING  
═══════════════════════════════════════ */  
document.getElementById('search-input').addEventListener('input', render);  
document.querySelectorAll('.sort-option').forEach(btn => {  
  btn.addEventListener('click', () => {  
    document.querySelectorAll('.sort-option').forEach(b => b.classList.remove('active'));  
    btn.classList.add('active');  
    currentSort = btn.dataset.sort;  
    render();  
  });  
});  
document.getElementById('filter-toggle').onclick = () =>  
  document.getElementById('filter-panel').classList.toggle('open');  
document.getElementById('clear-filters').onclick = () => {  
  activeFilters = { category:[], mood:[], style:[], length:[], tags:[] };  
  buildChips(); render();  
};  
document.getElementById('view-grid').onclick = () => {  
  currentView = 'grid';  
  document.getElementById('view-grid').classList.add('active');  
  document.getElementById('view-list').classList.remove('active');  
  render();  
};  
document.getElementById('view-list').onclick = () => {  
  currentView = 'list';  
  document.getElementById('view-list').classList.add('active');  
  document.getElementById('view-grid').classList.remove('active');  
  render();  
};  
document.getElementById('add-btn').onclick      = openModal;  
document.getElementById('modal-close').onclick  = closeModal;  
document.getElementById('modal-cancel').onclick = closeModal;  
document.getElementById('modal-save').onclick   = saveEntry;  
document.getElementById('f-title').addEventListener('input', updateLenPreview);  
document.getElementById('modal-overlay').addEventListener('click', e => {  
  if (e.target === document.getElementById('modal-overlay')) closeModal();  
});  
document.addEventListener('keydown', e => {  
  if (e.key === 'Escape') { closeModal(); closeConfirm(); closeCtx(); closePwModal(); }  
});  
  
/* ═══════════════════════════════════════  
   INIT  
═══════════════════════════════════════ */  
setAdminState(false);  
loadEntries();  
</script>  
</body>                                                     
</html>
