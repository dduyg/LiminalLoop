<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff00cc, #3333ff);
            color: #fff;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            box-shadow: 0px 0px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 4em;
            font-family: "Lobster", sans-serif;
            background: -webkit-linear-gradient(45deg, #00ffcc, #ff99cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5em;
            margin-bottom: 30px;
        }
        .search-bar {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .search-bar input {
            padding: 10px;
            width: 80%;
            max-width: 400px;
            border: 2px solid #fff;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1.2em;
            outline: none;
        }
        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .search-bar button {
            padding: 10px 20px;
            background-color: #ff99cc;
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 1.2em;
            cursor: pointer;
            margin-left: 10px;
        }
        .search-bar button:hover {
            background-color: #ff66b2;
        }
        .back-link {
            display: block;
            margin-top: 40px;
            color: #ff99cc;
            font-size: 1.2em;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        footer {
            margin-top: 50px;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <main>
        <h1>404</h1>
        <p>Oops! The page you're looking for is lost in cyberspace.</p>
        
        <!-- Search bar -->
        <div class="search-bar">
            <input type="text" placeholder="Search...">
            <button>Go</button>
        </div>
        
        <!-- Back link -->
        <a href="./search-bar-2" class="back-link">Go To V2.</a>

        <footer>@dduyg | Stay Rad.</footer>
    </main>
</body>
</html>
