<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Styling */
        body {
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(135deg, #ff94d6, #a7baff);
            height: 100vh;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Vaporwave Grid Background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.1),
                rgba(255, 255, 255, 0.1) 10px,
                transparent 10px,
                transparent 20px
            );
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 6rem;
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.3);
            color: #e2fefe;
        }

        p {
            font-size: 1.5rem;
            margin-top: 20px;
            line-height: 1.4;
            color: #c4e4ff;
        }

        .glitch-text {
            position: relative;
            display: inline-block;
            font-weight: bold;
            font-size: 1.3rem;
            text-transform: uppercase;
            color: #fff;
        }

        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .glitch-text::before {
            left: -2px;
            text-shadow: -2px 0 magenta;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim 2s infinite linear;
        }

        .glitch-text::after {
            left: 2px;
            text-shadow: -2px 0 cyan;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim2 2s infinite linear;
        }

        /* Animation for glitch effect */
        @keyframes glitch-anim {
            0% { clip: rect(44px, 9999px, 56px, 0); }
            10% { clip: rect(24px, 9999px, 90px, 0); }
            20% { clip: rect(84px, 9999px, 100px, 0); }
            30% { clip: rect(44px, 9999px, 56px, 0); }
            40% { clip: rect(24px, 9999px, 90px, 0); }
            50% { clip: rect(84px, 9999px, 100px, 0); }
            60% { clip: rect(44px, 9999px, 56px, 0); }
            70% { clip: rect(24px, 9999px, 90px, 0); }
            80% { clip: rect(84px, 9999px, 100px, 0); }
            90% { clip: rect(44px, 9999px, 56px, 0); }
            100% { clip: rect(24px, 9999px, 90px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 70px, 0); }
            10% { clip: rect(10px, 9999px, 130px, 0); }
            20% { clip: rect(65px, 9999px, 70px, 0); }
            30% { clip: rect(85px, 9999px, 140px, 0); }
            40% { clip: rect(45px, 9999px, 60px, 0); }
            50% { clip: rect(85px, 9999px, 140px, 0); }
            60% { clip: rect(45px, 9999px, 60px, 0); }
            70% { clip: rect(10px, 9999px, 130px, 0); }
            80% { clip: rect(65px, 9999px, 70px, 0); }
            90% { clip: rect(85px, 9999px, 140px, 0); }
            100% { clip: rect(10px, 9999px, 130px, 0); }
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            margin-top: 30px;
            color: #fff;
            background: #ff73fa;
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: bold;
            text-decoration: none;
            transition: background 0.3s;
            box-shadow: 0 4px 10px rgba(255, 115, 250, 0.6);
        }

        .button:hover {
            background: #ff49e4;
        }

        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>
            You’ve ventured too far, young explorer.<br>
            Looks like this page is lost in the digital abyss.
        </p>
        <p class="glitch-text" data-text="Error! Reality not found">Error! Reality not found</p>
        <a href="/" class="button">Back to Reality</a>
    </div>
    <footer>
        <p>It's not the end... just a detour.<br>Now let's head back!</p>
    </footer>
</body>
</html>
