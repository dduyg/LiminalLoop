<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(135deg, #ff6ec7, #ab47bc);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
        }

        p {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            margin: 1rem 0;
            line-height: 1.5;
        }

        .container {
            max-width: 600px;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .glitch {
            position: relative;
            color: #fff;
            font-size: 4rem;
            font-weight: 700;
        }

        .glitch:before, .glitch:after {
            content: '404';
            position: absolute;
            left: 0;
            right: 0;
            animation: glitch 1s infinite;
        }

        .glitch:before {
            top: -2px;
            left: -2px;
            color: #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
        }

        .glitch:after {
            top: 2px;
            left: 2px;
            color: #00fff9;
            clip: rect(24px, 450px, 60px, 0);
        }

        @keyframes glitch {
            0% {
                clip: rect(44px, 9999px, 56px, 0);
            }
            20% {
                clip: rect(15px, 9999px, 50px, 0);
            }
            40% {
                clip: rect(10px, 9999px, 50px, 0);
            }
            60% {
                clip: rect(25px, 9999px, 70px, 0);
            }
            80% {
                clip: rect(20px, 9999px, 60px, 0);
            }
            100% {
                clip: rect(44px, 9999px, 56px, 0);
            }
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            color: white;
            background-color: #ff00c1;
            border: 2px solid white;
            border-radius: 25px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #00fff9;
            transform: translateY(-3px);
            box-shadow: 0px 0px 15px 0px rgba(255, 0, 193, 0.5);
        }

        /* Media Query for Mobile */
        @media only screen and (max-width: 600px) {
            h1 {
                font-size: 3rem;
            }

            p {
                font-size: 1rem;
            }

            .btn {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="glitch">404</h1>
        <p>Oops! Looks like you've wandered into the digital abyss...<br>Don't worry, we won't tell anyone.</p>
        <a href="/" class="btn">Beam me up, Scotty!</a>
    </div>
</body>
</html>
