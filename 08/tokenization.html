<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            color: #FFFFFF;
            background: linear-gradient(135deg, #FF00FF, #0000FF);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        
        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 6em;
            margin: 0;
            letter-spacing: 0.1em;
            background: linear-gradient(90deg, #FF69B4, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glitch 2s infinite alternate;
        }

        p {
            font-size: 1.5em;
            margin: 20px 0;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        .search-box {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        input[type="text"] {
            width: 70%;
            padding: 10px;
            font-size: 1.2em;
            border: none;
            outline: none;
            border-radius: 5px;
        }

        input[type="submit"] {
            padding: 10px 20px;
            background: #00FFFF;
            border: none;
            color: #000;
            font-size: 1em;
            cursor: pointer;
            border-radius: 5px;
            margin-left: 10px;
        }

        input[type="submit"]:hover {
            background: #FFD700;
        }

        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            color: #FFFFFF;
            font-size: 0.9em;
        }

        /* Glitch effect */
        @keyframes glitch {
            0% {
                text-shadow: 2px 2px 5px rgba(0, 255, 255, 0.7);
            }
            50% {
                text-shadow: -2px -2px 5px rgba(255, 105, 180, 0.7);
            }
            100% {
                text-shadow: 2px -2px 5px rgba(255, 215, 0, 0.7);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Sorry, the page you're looking for doesn't exist.</p>
        <div class="search-box">
            <form action="/search" method="GET">
                <input type="text" name="q" placeholder="Search...">
                <input type="submit" value="Search">
            </form>
        </div>
        <footer>
            &copy; 2024 dduyg | <a href="/" style="color: #00FFFF; text-decoration: none;">Back to Home</a>
        </footer>
    </div>
</body>
</html>
