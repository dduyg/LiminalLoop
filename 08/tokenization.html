<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>dduyg</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1b1b2f;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1555529771-2335e2056e66?fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
        }

        h1 {
            font-size: 4rem;
            color: #ff69b4;
            text-shadow: 2px 2px 0 #00ffff;
        }

        p {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 10px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            width: 300px;
            margin-right: 10px;
        }

        button {
            padding: 10px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            background-color: #ff69b4;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff1493;
        }

        a {
            color: #00ffff;
            text-decoration: none;
            font-size: 1.2rem;
        }

        a:hover {
            text-decoration: underline;
        }

        .glitch {
            position: relative;
            font-size: 2rem;
            color: #00ffff;
            text-shadow: 2px 2px 0 #ff69b4;
            animation: glitch 1.5s infinite;
        }

        @keyframes glitch {
            0%, 100% {
                clip: rect(44px, 450px, 56px, 0);
            }
            33% {
                clip: rect(24px, 450px, 80px, 0);
            }
            66% {
                clip: rect(10px, 450px, 20px, 0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p class="glitch">Page Not Found</p>
        <p>Looks like you're lost in cyberspace. <br> Let's get you back to safety.</p>

        <div class="search-container">
            <input type="text" placeholder="Search...">
            <button>Search</button>
        </div>

        <p><a href="/">Go Back Home</a></p>
        <p><a href="/popular">Check Popular Pages</a></p>
    </div>
</body>
</html>
