<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #0d0221;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            animation: glitch 1.5s infinite;
        }
        h1 {
            font-size: 8rem;
            color: #ff66c4;
            text-shadow: 0 0 5px #ff66c4, 0 0 10px #ff66c4, 0 0 15px #ff66c4;
        }
        p {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #00d9ff;
            text-shadow: 0 0 5px #00d9ff, 0 0 10px #00d9ff;
        }
        .search-box {
            margin-top: 20px;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 1.2rem;
            border: none;
            outline: none;
            width: 300px;
            border-radius: 5px;
            background-color: #202040;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        input[type="submit"] {
            padding: 10px 20px;
            font-size: 1.2rem;
            margin-left: 10px;
            background-color: #ff66c4;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }
        input[type="submit"]:hover {
            background-color: #ff1493;
        }
        @keyframes glitch {
            0% { transform: skew(0.5deg, 0.5deg); }
            20% { transform: skew(-1deg, -1deg); }
            40% { transform: skew(0.5deg, 0.5deg); }
            60% { transform: skew(-0.5deg, -0.5deg); }
            100% { transform: skew(0deg, 0deg); }
        }
        .logo {
            font-size: 2rem;
            color: #00ffcc;
            text-shadow: 0 0 5px #00ffcc, 0 0 10px #00ffcc;
            margin-bottom: 40px;
        }
        .search-box input::placeholder {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">dduyg</div>
        <h1>404</h1>
        <p>Oops! The page you're looking for has vanished into the neon void.</p>
        <div class="search-box">
            <form action="#">
                <input type="text" placeholder="Search the site...">
                <input type="submit" value="Search">
            </form>
        </div>
    </div>
</body>
</html>
