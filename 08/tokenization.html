<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found</title>
    <style>
        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff94c2, #8ec5fc);
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 3s ease;
        }

        h1 {
            font-size: 10vw;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
        }

        p {
            font-size: 2vw;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.7);
        }

        .funny-message {
            margin-top: 20px;
            font-size: 1.5vw;
            color: #00ffd9;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .home-button {
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 1.2vw;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ffd9;
            color: #00ffd9;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .home-button:hover {
            background-color: #00ffd9;
            color: #000000;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .glitch {
            font-size: 3vw;
            color: #ff00ff;
            position: relative;
        }

        .glitch::before, .glitch::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            color: #00ffff;
            background: none;
            clip-path: inset(0 1px);
            animation: glitch 2s infinite;
        }

        .glitch::after {
            left: 2px;
            color: #ff00ff;
            clip-path: inset(0 2px);
            animation: glitch2 2s infinite;
        }

        @keyframes glitch {
            0%, 20%, 40%, 60%, 100% {
                clip-path: inset(0 0 0 0);
            }
            10%, 30%, 50%, 70% {
                clip-path: inset(10% 0 0 0);
            }
        }

        @keyframes glitch2 {
            0%, 20%, 40%, 60%, 100% {
                clip-path: inset(0 0 0 0);
            }
            10%, 30%, 50%, 70% {
                clip-path: inset(0 0 10% 0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="glitch">404</h1>
        <p>Oops, it looks like you've taken a wrong turn in the matrix!</p>
        <p class="funny-message">The page you're looking for has transcended dimensions. Maybe it’s chillin' in a parallel universe?</p>
        <a href="/" class="home-button">Return to dduyg HQ</a>
    </div>

</body>
</html>
