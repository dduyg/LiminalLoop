<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            background: linear-gradient(135deg, #ffb6c1, #add8e6, #9370db);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        h1 {
            font-size: 6rem;
            margin: 0;
            text-shadow: 2px 2px #000;
        }

        h2 {
            font-size: 2rem;
            text-shadow: 1px 1px #000;
        }

        .logo {
            font-size: 1.5rem;
            margin-top: 20px;
            color: #00ffff;
            text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.8);
        }

        .glitch {
            position: relative;
            font-size: 4rem;
            color: #ff00ff;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% {
                transform: translate(0);
            }
            20% {
                transform: translate(-2px, 2px);
            }
            40% {
                transform: translate(2px, -2px);
            }
            60% {
                transform: translate(-2px, -2px);
            }
            80% {
                transform: translate(2px, 2px);
            }
            100% {
                transform: translate(0);
            }
        }

        .search-box {
            margin-top: 30px;
        }

        input[type="text"] {
            width: 70%;
            max-width: 300px;
            padding: 10px;
            font-size: 1.2rem;
            border: none;
            outline: none;
            border-radius: 25px;
            background-color: rgba(255, 255, 255, 0.3);
            color: white;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        input[type="text"]::placeholder {
            color: #fff;
            opacity: 0.7;
        }

        input[type="submit"] {
            margin-left: 10px;
            padding: 10px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            background-color: #9370db;
            color: white;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        .home-link {
            margin-top: 20px;
            font-size: 1.5rem;
            color: #00ffff;
            text-decoration: none;
        }

        .home-link:hover {
            color: #ff00ff;
        }

        footer {
            margin-top: 50px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <div>
        <h1 class="glitch">404</h1>
        <h2>Oops! Page Not Found</h2>
        <div class="logo">dduyg</div>

        <!-- Search Bar -->
        <div class="search-box">
            <form action="/search" method="get">
                <input type="text" name="query" placeholder="Search for something else...">
                <input type="submit" value="Search">
            </form>
        </div>

        <a href="../" class="home-link">Take me back</a>

        <footer>
            @dduyg | Stay Rad.
        </footer>
    </div>

</body>
</html>
