<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        html { height: 100%; }
        body {
            font-family: Arial, sans-serif;
            background: #A3C4D0;
            background: linear-gradient(to bottom, #f8f5da 0%,#FFF4E2 20%,#A3C4D0 50%,#3e4f53 100%);
            color: #101010;
            margin: 0;
            padding: 0;
            height: 100%;
            background-repeat: no-repeat;
            background-attachment: fixed;     
        }
        header {
            text-align: center;
            padding: 50px 0;
        }
        nav {
            text-align: center;
            margin-bottom: 20px;
        }
        nav a {
            display: inline-block;
            color: #101010;
            text-decoration: none;
            margin: 15px 10px;
            padding: 5px 10px;
            border-radius: 10px;
            border: 2px solid #101010;
            transition: all 0.3s ease;
            text-align: center;
            cursor: pointer;
        }
        nav a:hover {
            background-color: #101010;
            color: #FAF4DC;
        }
        main {
            max-width: 800px;
            margin: 0 auto;
        }
        section {
            padding: 50px 20px;
            text-align: center;
        }
        section h2 {
            font-family: 'DM Serif Display', serif;
            margin-bottom: 20px;
        }
        section p {
            font-size: 18px;
            line-height: 1.6;
        }
        .content {
            padding: 20px;
            border: 2px solid #101010;
            margin-bottom: 30px;
            box-shadow: rgba(139, 52, 97, 0.3) 0px 1vh 3vh;
            border-radius: 3vw;      
        }
    </style>
</head>
<body>
    <header>
        <h1>Your Name</h1>
        <p>Project Showcasing</p>
    </header>
    <nav>
        <a href="#overview">Overview</a>
        <a href="#features">Features</a>
        <a href="#usage">Usage Documentation</a>
        <a href="#example">Example Usage</a>
    </nav>
    <main>
        <section id="overview">
            <h2>Overview</h2>
            <div class="content">
               <!-- Add your overview content here -->
            </div>
        </section>
        <section id="features">
            <h2>Features</h2>
            <div class="content">
              <!-- Add your features content here -->
            </div>
        </section>
        <section id="usage">
            <h2>Usage Documentation</h2>
            <div class="content">
              <!-- Add your usage documentation content here -->
            </div>
        </section>
        <section id="example">
            <h2>Example Usage</h2>
            <div class="content">
              <!-- Add your example usage content here -->
            </div>
        </section>
    </main>
</body>
</html>
